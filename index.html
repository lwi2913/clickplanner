<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>클릭 플래너</title>
  <style>
    :root {
      --bg:#050505; --card-bg:#1c1c1c; --input-bg:#111;
      --accent:#00e5ff; --first-beat:#ff3333;
      --text:#ffffff; --sub-text:#bbbbbb; --border:#484848;
      --seg-bg:#303030; --seg-active:#555;
      --danger:#ff453a; --success:#30d158;
      --card-w:320px;
    }
    [data-theme="light"] {
      --bg:#f2f2f7; --card-bg:#fff; --input-bg:#fff;
      --accent:#007aff; --first-beat:#ff3b30;
      --text:#000; --sub-text:#555; --border:#c0c0c8;
      --seg-bg:#dcdce0; --seg-active:#fff;
      --danger:#ff3b30; --success:#34c759;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{
      background:var(--bg);color:var(--text);
      font-family:'Malgun Gothic','맑은 고딕',-apple-system,sans-serif;
      padding:24px 16px 120px;
      transition:background .3s,color .3s;
      min-height:100vh;
    }
    ::-webkit-scrollbar{width:6px;}
    ::-webkit-scrollbar-track{background:transparent;}
    ::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}

    /* ══ 헤더 ══ */
    header{
      text-align:center;margin-bottom:24px;position:relative;
      max-width:var(--panel-maxw, 680px);
      margin-left:auto;margin-right:auto;
    }
    h1{color:var(--accent);font-size:2rem;font-weight:900;margin-bottom:4px;}
    .subtitle{color:var(--sub-text);font-size:12px;margin-bottom:16px;}
    .theme-switcher{
      position:absolute;top:0;right:0;
      background:var(--seg-bg);padding:4px;border-radius:10px;display:flex;gap:3px;
    }
    .theme-btn{border:none;background:transparent;color:var(--sub-text);padding:5px 10px;border-radius:7px;cursor:pointer;font-size:11px;font-weight:800;font-family:inherit;transition:.2s;}
    .theme-btn.active{background:var(--card-bg);color:var(--accent);}

    /* ══ 입력 패널 / 세트리스트 패널 공통 ══ */
    .top-panel{
      background:var(--card-bg);border:1px solid var(--border);border-radius:16px;
      padding:16px;
      max-width:var(--panel-maxw, 680px);
      width:100%;
      margin:0 auto 20px;
    }
    /* 타이틀 및 버튼 헤더 영역 추가 */
    .panel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .panel-title { font-size:11px; font-weight:800; letter-spacing:1.5px; color:var(--sub-text); text-transform:uppercase; margin-bottom:0; }
    .panel-btn { background: var(--seg-bg); color: var(--text); border: 1px solid var(--border); border-radius: 6px; padding: 5px 10px; font-size: 11px; font-weight: 800; cursor: pointer; transition: 0.2s; white-space: nowrap; }
    .panel-btn:hover { background: var(--seg-active); border-color: var(--accent); color: var(--accent); }

    textarea{
      width:100%;min-height:72px;
      max-height:360px;
      background:var(--input-bg);color:var(--text);
      padding:10px 12px;border-radius:10px;border:1px solid var(--border);
      font-size:13px;font-family:inherit;resize:vertical;overflow-y:auto;line-height:1.6;
    }
    textarea:focus{outline:none;border-color:var(--accent);}
    textarea::placeholder{color:var(--sub-text);}

    .btn-row{display:flex;gap:8px;margin-top:10px;}
    .btn-primary{flex:2;background:var(--accent);color:#000;font-weight:900;font-size:14px;padding:11px;border:none;border-radius:10px;cursor:pointer;transition:opacity .2s,transform .1s;font-family:inherit;}
    .btn-primary:hover{opacity:.85;}
    .btn-primary:active{transform:scale(.97);}
    [data-theme="light"] .btn-primary{color:#fff;}
    .btn-secondary{flex:1;background:transparent;border:2px dashed var(--border);color:var(--sub-text);font-weight:800;border-radius:10px;cursor:pointer;transition:.2s;font-family:inherit;font-size:13px;}
    .btn-secondary:hover{border-color:var(--accent);color:var(--accent);}

    /* ══ 워크스페이스 ══ */
    .workspace{
      display:grid;gap:16px;justify-content:center;
      max-width:1800px;margin:0 auto;
      grid-template-columns:repeat(auto-fill,minmax(280px,420px));
    }
    @media(max-width:800px){.workspace{grid-template-columns:repeat(2,1fr);}}
    @media(max-width:600px){.workspace{grid-template-columns:1fr;}}

    /* ══ 카드 ══ */
    .song-card{background:var(--card-bg);border-radius:18px;overflow:hidden;border:1.5px solid var(--border);position:relative;transition:border-color .06s,box-shadow .2s;width:100%;}
    .song-card:hover{box-shadow:0 6px 24px rgba(0,0,0,.4);}
    .song-card.dragging{opacity:.45;transform:scale(.96);}
    .song-card.drag-over{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,229,255,.3);}
    .song-card.drag-dim{opacity:.35;transform:scale(.93);transition:opacity .18s,transform .18s;}
    .song-card.flash-accent{background:rgba(0,229,255,.44)!important;border-color:var(--accent)!important;box-shadow:0 0 30px rgba(0,229,255,.65)!important;transition:background 0s,box-shadow 0s,border-color 0s!important;}
    .song-card.flash-first{background:rgba(255,40,40,.50)!important;border-color:#ff2222!important;box-shadow:0 0 30px rgba(255,40,40,.70)!important;transition:background 0s,box-shadow 0s,border-color 0s!important;}
    .song-card.flash-tap{background:rgba(255,205,0,.52)!important;border-color:#ffd700!important;box-shadow:0 0 30px rgba(255,205,0,.65)!important;transition:background 0s!important;}

    /* ══ 썸네일 (가로 분할 레이아웃으로 변경 및 16:9 높이 맞춤) ══ */
    .thumb-section { width: 100%; height: 135px; display: flex; align-items: center; background: #000; border-bottom: 1px solid var(--border); overflow: hidden; position: relative; }
    
    .drag-handle-zone { width: 42px; height: 100%; display: flex; align-items: center; justify-content: center; cursor: grab; z-index: 10; background: linear-gradient(to right, rgba(0,0,0,0.8), rgba(0,0,0,0.2)); flex-shrink: 0; user-select: none; touch-action: none; }
    .drag-handle-zone:active { cursor: grabbing; }
    .drag-handle-icon { color: rgba(255,255,255,0.8); font-size: 24px; text-shadow: 0 2px 6px rgba(0,0,0,0.9); }
    .drag-handle-zone:hover .drag-handle-icon { color: var(--accent); }

    .thumb-center { flex: 1; height: 100%; position: relative; display: flex; align-items: center; justify-content: center; overflow: hidden; background: #0a0a0a; }
    .thumb-center img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.3; z-index: 1; pointer-events: none; }
    .youtube-iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: none; z-index: 3; pointer-events: auto; }

    /* 우측 액션 버튼 정렬 */
    .thumb-actions { width: 48px; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; z-index: 10; background: linear-gradient(to left, rgba(0,0,0,0.8), rgba(0,0,0,0.2)); flex-shrink: 0; }
    .thumb-btn { width: 30px; height: 30px; padding: 0; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.25); color: #fff; border-radius: 8px; font-size: 14px; cursor: pointer; transition: 0.15s; line-height: 1; backdrop-filter: blur(4px); }
    .thumb-btn:hover { transform: scale(1.1); background: rgba(255,255,255,0.25); }
    .thumb-btn.link-btn:hover { background: rgba(0,229,255,0.6); border-color: var(--accent); }
    .thumb-btn.del-btn:hover { background: rgba(255,69,58,0.7); border-color: var(--danger); }
    
    [data-theme="light"] .thumb-section { background: #dcdce0; }
    [data-theme="light"] .drag-handle-icon { color: rgba(0,0,0,0.6); }

    .no-thumb-content{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;width:100%;padding:0 10px;z-index:4;}
    .no-thumb-label{color:var(--text);font-size:11px;font-weight:800;white-space:nowrap;flex-shrink:0;}
    .link-input-inline{width:100%;background:rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.3);color:#fff;border-radius:7px;padding:6px 8px;font-size:11px;font-family:inherit;outline:none;text-align:center;}
    .link-input-inline:focus{border-color:var(--accent);}
    [data-theme="light"] .link-input-inline{background:rgba(255,255,255,.7);border-color:rgba(0,0,0,.3);color:#111;}
    .link-apply-btn{background:var(--accent);color:#000;border:none;border-radius:7px;padding:6px 16px;font-size:11px;font-weight:900;cursor:pointer;font-family:inherit;}
    [data-theme="light"] .link-apply-btn{color:#fff;}

    /* ══ 카드 정보 ══ */
    .info-section{padding:12px 12px 10px;}
    .editable-title{font-size:1.05rem;font-weight:900;color:var(--accent);margin-bottom:10px;outline:none;border-radius:6px;padding:2px 4px;transition:background .2s;word-break:break-all;min-height:1.4em;}
    .editable-title:focus{background:var(--seg-bg);}
    .bpm-ctrl{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:10px;}
    .bpm-wrap{text-align:center;}
    .bpm-val{font-size:3rem;font-weight:900;min-width:90px;text-align:center;outline:none;letter-spacing:-2px;line-height:1;border-radius:8px;padding:2px 4px;transition:background .2s;}
    .bpm-val:focus{background:var(--seg-bg);}
    .bpm-unit{font-size:10px;font-weight:800;color:var(--sub-text);letter-spacing:2px;margin-top:2px;}
    .step-btn{width:44px;height:44px;border-radius:12px;border:none;background:var(--seg-bg);color:var(--text);font-size:22px;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s,transform .1s;user-select:none;touch-action:none;}
    .step-btn:hover{background:var(--seg-active);}
    .step-btn:active{transform:scale(.88);background:var(--accent);color:#000;}

    /* ══ 비주얼라이저 ══ */
    .beat-visualizer{display:flex;width:100%;height:28px;gap:3px;margin-bottom:14px;}

    .beat-block{
      flex:1;border-radius:6px;position:relative;overflow:hidden;cursor:pointer;
      background:rgba(120,120,130,.18);
      box-shadow:0 0 0 1.5px rgba(160,160,170,.35) inset;
      transition:background .12s,box-shadow .12s;
    }
    [data-theme="light"] .beat-block{
      background:rgba(100,100,110,.12);
      box-shadow:0 0 0 1.5px rgba(100,100,110,.3) inset;
    }
    .beat-block.state-accent{
      background:rgba(255,55,55,.10)!important;
      box-shadow:0 0 0 2.5px #ff3333 inset!important;
    }
    .beat-block.state-off{
      background:transparent!important;
      box-shadow:0 0 0 1.5px rgba(130,130,140,.3) inset!important;
    }
    .beat-block.state-off::after{
      content:'';position:absolute;inset:0;border-radius:6px;pointer-events:none;
      background:repeating-linear-gradient(45deg,rgba(140,140,150,.18) 0px,rgba(140,140,150,.18) 1.5px,transparent 1.5px,transparent 7px);
    }
    [data-theme="light"] .beat-block.state-off::after{
      background:repeating-linear-gradient(45deg,rgba(80,80,90,.15) 0px,rgba(80,80,90,.15) 1.5px,transparent 1.5px,transparent 7px);
    }
    .beat-block.flash-blue{background:var(--accent)!important;box-shadow:0 0 16px var(--accent)!important;transition:background 0s,box-shadow 0s!important;}
    .beat-block.flash-red{background:#ff3333!important;box-shadow:0 0 16px #ff3333!important;transition:background 0s,box-shadow 0s!important;}

    /* ══ Sub 슬롯 ══ */
    .sub-slot{
      position:absolute;top:0;height:100%;cursor:pointer;
      background:rgba(120,120,130,.22);transition:background .08s;
    }
    .sub-slot:not(:first-child){border-left:2px solid var(--card-bg);}
    .sub-slot.sub-accent{background:rgba(255,55,55,.12)!important;box-shadow:0 0 0 2px #ff3333 inset!important;}
    .sub-slot.sub-off{background:transparent!important;}
    .sub-slot.sub-off::after{content:'';position:absolute;inset:0;pointer-events:none;background:repeating-linear-gradient(45deg,rgba(140,140,150,.18) 0px,rgba(140,140,150,.18) 1.5px,transparent 1.5px,transparent 7px);}
    
    .sub-slot.sub-flash{background:var(--accent)!important;box-shadow:0 0 10px var(--accent)!important;transition:background 0s,box-shadow 0s!important;}
    .sub-slot.sub-flash-accent{background:#ff3333!important;box-shadow:0 0 10px #ff3333!important;transition:background 0s,box-shadow 0s!important;}

    /* ══ 설정 ══ */
    .setting-group{display:flex;flex-direction:column;gap:9px;margin-bottom:12px;}
    .setting-row{display:flex;justify-content:space-between;align-items:center;}
    .setting-label{font-size:12px;font-weight:900;letter-spacing:.6px;color:var(--text);min-width:52px;text-transform:uppercase;flex-shrink:0;}
    .segmented-control{display:flex;background:var(--seg-bg);border-radius:10px;padding:3px;gap:2px;flex:1;margin-left:8px;}
    .seg-btn{
      flex:1;border:none;background:transparent;color:var(--sub-text);
      padding:5px 2px;border-radius:7px;cursor:pointer;
      font-size:11px;font-weight:800;font-family:inherit;
      transition:.2s;white-space:nowrap;
      display:flex;align-items:center;justify-content:center;
      height:42px;min-width:0;
    }
    .seg-btn:hover:not(.active){color:var(--text);}
    .seg-btn.active{background:var(--seg-active);color:var(--text);box-shadow:0 1px 5px rgba(0,0,0,.3);}
    .seg-btn svg{display:block;overflow:visible;}
    .vol-container{display:flex;align-items:center;gap:8px;flex:1;margin-left:8px;}
    .mute-btn{background:var(--seg-bg);border:1px solid var(--border);border-radius:8px;font-size:15px;cursor:pointer;color:var(--text);padding:4px 8px;transition:background .2s;}
    .mute-btn:hover{background:var(--seg-active);}
    .mute-btn.muted{background:rgba(255,69,58,.22);border-color:var(--danger);}
    input[type="range"]{flex:1;height:5px;cursor:pointer;accent-color:var(--accent);}
    .btn-group{display:flex;gap:8px;}
    .btn{flex:1;padding:18px 8px;border-radius:14px;border:none;font-weight:900;font-size:.95rem;cursor:pointer;font-family:inherit;letter-spacing:1.2px;text-transform:uppercase;user-select:none;-webkit-user-select:none;touch-action:manipulation;transition:opacity .1s,transform .08s,background .1s,box-shadow .1s;}
    .btn:active{transform:scale(.93);}
    .btn-tap{background:var(--seg-bg);color:var(--text);border:1.5px solid var(--border);}
    .btn-tap:active{background:rgba(255,205,0,.6)!important;border-color:#ffd700!important;color:#000!important;}
    .btn-play{background:#1a7fff;color:#fff;}
    .btn-play:hover{opacity:.88;}
    .btn-play.active{background:var(--first-beat);box-shadow:0 0 16px rgba(255,51,51,.5);}

    /* ══ 모달 ══ */
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:99999;display:flex;align-items:center;justify-content:center;animation:fadeIn .15s ease;}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    .modal-box{background:var(--card-bg);border:1.5px solid var(--border);border-radius:20px;padding:28px 24px 20px;max-width:320px;width:90%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.7);animation:popIn .18s cubic-bezier(.34,1.56,.64,1);}
    @keyframes popIn{from{transform:scale(.85);opacity:0}to{transform:scale(1);opacity:1}}
    .modal-icon{font-size:2.2rem;margin-bottom:12px;}
    .modal-title{font-size:1rem;font-weight:900;margin-bottom:8px;color:var(--text);}
    .modal-msg{font-size:.85rem;color:var(--sub-text);line-height:1.6;margin-bottom:20px;}
    .modal-btns{display:flex;gap:10px;}
    .modal-btn{flex:1;padding:12px;border-radius:12px;border:none;font-weight:900;font-size:.9rem;cursor:pointer;font-family:inherit;transition:opacity .2s,transform .1s;}
    .modal-btn:active{transform:scale(.95);}
    .modal-btn-cancel{background:var(--seg-bg);color:var(--text);}
    .modal-btn-cancel:hover{background:var(--seg-active);}
    .modal-btn-confirm{background:var(--danger);color:#fff;}
    .modal-btn-confirm:hover{opacity:.85;}

    /* ══ 자동 스크롤 존 ══ */
    #scroll-zone-top,#scroll-zone-bot{position:fixed;left:0;right:0;height:80px;z-index:8888;pointer-events:none;opacity:0;transition:opacity .2s;}
    #scroll-zone-top{top:0;background:linear-gradient(to bottom,rgba(0,229,255,.22),transparent);}
    #scroll-zone-bot{bottom:0;background:linear-gradient(to top,rgba(0,229,255,.22),transparent);}
    #scroll-zone-top.visible,#scroll-zone-bot.visible{opacity:1;}

    /* ══ 세트리스트 ══ */
    .setlist-output{width:100%;min-height:90px;max-height:360px;background:var(--input-bg);color:var(--text);padding:10px 12px;border-radius:10px;border:1px solid var(--border);font-size:12px;font-family:'Malgun Gothic',monospace,sans-serif;resize:vertical;overflow-y:auto;line-height:1.8;margin-top:8px;}
    .setlist-output:focus{outline:none;border-color:var(--accent);}

    .empty-state{grid-column:1/-1;text-align:center;padding:50px 20px;color:var(--sub-text);}
    .empty-state-icon{font-size:2.8rem;margin-bottom:10px;opacity:.4;}
    .empty-state-text{font-size:13px;font-weight:700;opacity:.6;line-height:1.7;}

    @media(max-width:400px){
      h1{font-size:1.5rem;}
      .theme-switcher{position:static;margin:0 auto 12px;width:fit-content;}
      .bpm-val{font-size:2.4rem;}
      .info-section{padding:10px 8px 8px;}
    }
  </style>
</head>
<body data-theme="dark">

<div id="scroll-zone-top"></div>
<div id="scroll-zone-bot"></div>

<!-- ══ 콘티 입력 패널 ══ -->
<header>
  <h1>클릭 플래너</h1>
  <p class="subtitle">Live Worship Click Planner — AudioWorklet Edition</p>
  <div class="theme-switcher">
    <button class="theme-btn active" onclick="setTheme('dark',this)">Dark</button>
    <button class="theme-btn" onclick="setTheme('light',this)">Light</button>
  </div>
</header>

<div class="top-panel" id="input-panel">
  <div class="panel-header">
    <div class="panel-title">📋 콘티 입력</div>
    <button class="panel-btn" onclick="clearConti()">초기화</button>
  </div>
  <textarea id="conti-input" placeholder="예시:&#10;1. 그 이름&#10;https://youtu.be/xxxxx&#10;2. 살아계신 주 https://youtu.be/yyyyy&#10;3. Way Maker + 나의 주&#10;https://youtu.be/aaaaaa&#10;https://youtu.be/bbbbbb"></textarea>
  <div class="btn-row">
    <button class="btn-primary" onclick="analyzeConti()">🎼 플래너 생성</button>
    <button class="btn-secondary" onclick="addEmptyCard()">＋ Add Empty</button>
  </div>
</div>

<!-- ══ 워크스페이스 ══ -->
<div class="workspace" id="workspace">
  <div class="empty-state">
    <div class="empty-state-icon">🎹</div>
    <div class="empty-state-text">콘티를 입력하고 [플래너 생성]을 누르거나<br>[+ Add Empty]로 카드를 추가하세요.</div>
  </div>
</div>

<!-- ══ 세트리스트 패널 ══ -->
<div class="top-panel" id="setlist-panel" style="margin-top:28px;">
  <div class="panel-header">
    <div class="panel-title">📤 세트리스트 추출</div>
    <button class="panel-btn" id="copy-setlist-btn" onclick="copySetlist()">클립보드에 복사하기</button>
  </div>
  <textarea class="setlist-output" id="setlist-output" readonly placeholder="추출된 세트리스트가 여기에 표시됩니다..."></textarea>
</div>

<script>
'use strict';

/* ══════════════════════════════════════════
   AudioWorklet Processor
══════════════════════════════════════════ */
const WORKLET_CODE = `
class ClickProcessor extends AudioWorkletProcessor {
  constructor() {
    super();
    this._bpm=120; this._subDiv=1; this._sig=4;
    this._running=false; this._slotIdx=0; this._countdown=0;
    this._samplesPerBeat=0;
    this.port.onmessage = (e) => {
      const d=e.data;
      if(d.type==='start'){
        this._bpm=d.bpm; this._subDiv=d.subDiv; this._sig=d.sig;
        this._running=true; this._slotIdx=0; this._countdown=0;
        this._updateSPB();
      } else if(d.type==='stop'){
        this._running=false; this._slotIdx=0;
      } else if(d.type==='bpm'){
        this._bpm=d.bpm; this._updateSPB();
        if(this._countdown>this._samplesPerBeat) this._countdown=this._samplesPerBeat;
      } else if(d.type==='subDiv'){
        this._subDiv=d.subDiv; this._updateSPB();
        const total=this._sig*this._subDiv;
        this._slotIdx=this._slotIdx%total;
      } else if(d.type==='sig'){
        this._sig=d.sig; this._slotIdx=0; this._updateSPB();
      }
    };
  }
  _updateSPB(){
    const bps=(this._bpm/60)*this._subDiv;
    this._samplesPerBeat=Math.round(sampleRate/bps);
  }
  process(inputs,outputs){
    if(!this._running) return true;
    const bs=(outputs[0][0]?outputs[0][0].length:128);
    let i=0;
    while(i<bs){
      if(this._countdown<=0){
        this.port.postMessage({type:'beat',slotIdx:this._slotIdx,offsetSec:i/sampleRate});
        const total=this._sig*this._subDiv;
        this._slotIdx=(this._slotIdx+1)%total;
        this._countdown=this._samplesPerBeat;
      }
      const step=Math.min(this._countdown,bs-i);
      this._countdown-=step; i+=step;
    }
    return true;
  }
}
registerProcessor('click-processor',ClickProcessor);

/* ══ Web Speech ══ */
let speechSynth = window.speechSynthesis || null;
let voiceCache = null;
let speechUnlocked = false;

function getVoice(){
  if(voiceCache) return voiceCache;
  if(!speechSynth) return null;
  const voices = speechSynth.getVoices();
  voiceCache = voices.find(v=>v.lang.startsWith('en-US')) ||
               voices.find(v=>v.lang.startsWith('en')) ||
               (voices.length?voices[0]:null);
  return voiceCache;
}
if(speechSynth) speechSynth.onvoiceschanged = ()=>{ voiceCache=null; getVoice(); };

function speakBeat(text, time){
  if(!speechSynth) return;
  const delayMs = Math.max(0,(time - audioCtx.currentTime)*1000);
  setTimeout(()=>{
    try {
      // 큐가 밀려 앱이 다운되는 현상 방지: 재생 중이면 스킵
      if(speechSynth.speaking && speechSynth.pending) return; 
      
      const u = new SpeechSynthesisUtterance(text);
      u.rate = 1.8; // 연음에 적합한 속도
      u.pitch = 1.1; 
      u.volume = 1.0;
      const v = getVoice();
      if(v) u.voice = v;
      u.lang = 'en-US';
      speechSynth.speak(u);
    } catch(e) {
      console.warn("Speech Engine Error (Ignored):", e);
    }
  }, delayMs);
}

/* ══ AudioContext & 모바일 Voice 강제 해제 ══ */
async function ensureAudio(){
  if(!audioCtx){
    audioCtx=new (window.AudioContext||window.webkitAudioContext)();
    gainMaster=audioCtx.createGain();
    gainMaster.gain.value=2.2;
    const comp=audioCtx.createDynamicsCompressor();
    comp.threshold.value=-6; comp.knee.value=3; comp.ratio.value=4;
    comp.attack.value=0.001; comp.release.value=0.1;
    gainMaster.connect(comp); comp.connect(audioCtx.destination);
  }
  if(audioCtx.state==='suspended') await audioCtx.resume();

  if(!speechUnlocked && speechSynth) {
    try {
      const u = new SpeechSynthesisUtterance('');
      u.volume = 0;
      speechSynth.speak(u);
      speechUnlocked = true;
    } catch(e) {}
  }

  if(!workletReady){
    const blob=new Blob([WORKLET_CODE],{type:'application/javascript'});
    const url=URL.createObjectURL(blob);
    await audioCtx.audioWorklet.addModule(url);
    URL.revokeObjectURL(url); workletReady=true;
  }
  return audioCtx;
}

/* ══ 메트로놈 ══ */
async function startMetro(id){
  const m=metros[id]; if(!m) return;
  try{
    const ctx=await ensureAudio();
    const node=new AudioWorkletNode(ctx,'click-processor');
    node.connect(ctx.destination);
    m.workletNode=node;
    node.port.onmessage=(e)=>{
      if(e.data.type!=='beat') return;
      if(!metros[id]?.isPlaying) return;
      const beatTime=ctx.currentTime+e.data.offsetSec+0.005;
      handleBeat(id, e.data.slotIdx, beatTime);
    };
    node.port.postMessage({type:'start',bpm:m.bpm,subDiv:m.subDiv,sig:m.sig});
    m.isPlaying=true;
    const btn=document.getElementById('p-btn-'+id);
    if(btn){ btn.innerText='STOP'; btn.classList.add('active'); }
    autosave();
  }catch(err){ console.error('startMetro:',err); }
}

function stopMetro(id){
  const m=metros[id]; if(!m) return;
  if(m.workletNode){
    m.workletNode.port.postMessage({type:'stop'});
    try{ m.workletNode.disconnect(); }catch(e){}
    m.workletNode=null;
  }
  m.isPlaying=false;
  const btn=document.getElementById('p-btn-'+id);
  if(btn){ btn.innerText='START'; btn.classList.remove('active'); }
  clearVizFlash(id);
  // 정지 시 꼬여있는 Voice 큐 비우기
  if(speechSynth && speechSynth.speaking) {
      try { speechSynth.cancel(); } catch(e) {}
  }
}

function toggleMetro(id){
  if(metros[id]?.isPlaying) stopMetro(id); else startMetro(id);
}

/* ══ 박자 처리 ══ */
function handleBeat(id, slotIdx, beatTime){
  const m=metros[id]; if(!m||!audioCtx) return;
  const ctx=audioCtx;
  const div=m.subDiv;
  const qIdx=Math.floor(slotIdx/div);
  const sIdx=slotIdx%div;
  const isMain=(sIdx===0);

  let isOff=false, isAccent=false;
  
  if(div === 1){
    const bs=m.blockStates[qIdx]??0;
    isOff = (bs === 2);
    isAccent = (bs === 1);
  } else {
    const ss=(m.subStates[qIdx]?.[sIdx])??0;
    isOff = (ss === 2);
    isAccent = (ss === 1);
  }

  const vol = isAccent ? m.vol : m.vol * 0.80;

  if(!m.muted && !isOff){
    if(m.sound==='voice'){
      playVoice(m.sig, qIdx, div, sIdx, beatTime);
    } else {
      playSound(m.sound, isAccent, vol, beatTime);
    }
  }

  const delayMs=Math.max(0,(beatTime-ctx.currentTime)*1000);
  setTimeout(()=>{
    if(!metros[id]?.isPlaying) return;
    
    if(isMain&&!isOff){
      const card=document.getElementById('card-'+id);
      if(card){
        card.classList.remove('flash-accent','flash-first');
        void card.offsetWidth;
        card.classList.add(isAccent ? 'flash-first' : 'flash-accent');
        setTimeout(()=>card.classList.remove('flash-accent','flash-first'),80);
      }
    }
    
    clearVizFlash(id);
    
    if(!isOff){
      if(div===1){
        const blk=document.getElementById('block-'+id+'-'+qIdx);
        if(blk){
          blk.classList.add(isAccent?'flash-red':'flash-blue');
          setTimeout(()=>blk.classList.remove('flash-blue','flash-red'),130);
        }
      } else {
        const subEl=document.getElementById('sub-'+id+'-'+qIdx+'-'+sIdx);
        if(subEl){
          subEl.classList.add(isAccent?'sub-flash-accent':'sub-flash');
          setTimeout(()=>subEl.classList.remove('sub-flash','sub-flash-accent'),110);
        }
      }
    }
  },delayMs);
}

/* ══ 소리 합성 (디지털, 맑은 우드, 비프음) ══ */
function playSound(type, isHigh, vol, t){
  if(!audioCtx||!gainMaster) return;
  t=t||audioCtx.currentTime;
  const gain=audioCtx.createGain();
  gain.connect(gainMaster);

  if(type==='digital'){
    const osc=audioCtx.createOscillator(); osc.type='square';
    osc.frequency.setValueAtTime(isHigh?1050:720,t);
    osc.connect(gain);
    gain.gain.setValueAtTime(vol*.5,t);
    gain.gain.exponentialRampToValueAtTime(0.001,t+.06);
    osc.start(t); osc.stop(t+.07);

  } else if(type==='wood'){
    // 합성음 느낌을 빼고 맑은 나무 타격음으로 복구
    const ctx=audioCtx;
    const dur=0.08;
    
    const osc=ctx.createOscillator();
    osc.type='sine';
    // 나무 특유의 공명 대역과 피치 드롭
    osc.frequency.setValueAtTime(isHigh?1200:800, t);
    osc.frequency.exponentialRampToValueAtTime(isHigh?900:600, t+0.04);
    
    const og=ctx.createGain();
    og.gain.setValueAtTime(vol*3.0, t);
    og.gain.exponentialRampToValueAtTime(0.001, t+dur);
    
    osc.connect(og); og.connect(gain);
    osc.start(t); osc.stop(t+dur);

  } else if(type==='beep'){
    // 선명한 뚜-뚜- 전자음
    const ctx=audioCtx;
    const osc=ctx.createOscillator();
    osc.type='sine';
    osc.frequency.setValueAtTime(isHigh?1200:800, t);
    const og=ctx.createGain();
    og.gain.setValueAtTime(vol*1.5, t);
    og.gain.setValueAtTime(vol*1.5, t+0.03); 
    og.gain.exponentialRampToValueAtTime(0.001, t+0.05);
    osc.connect(og); og.connect(gain);
    osc.start(t); osc.stop(t+0.06);
    
  } else {
    // 폴백 기본음
    const osc=audioCtx.createOscillator(); osc.type='sine';
    osc.frequency.value=isHigh?1320:880;
    osc.connect(gain);
    gain.gain.setValueAtTime(vol*1.1,t);
    gain.gain.exponentialRampToValueAtTime(0.001,t+.09);
    osc.start(t); osc.stop(t+.1);
  }
}

/* ══ BPM ══ */
function sendBpm(id){ const m=metros[id]; if(m?.isPlaying&&m.workletNode) m.workletNode.port.postMessage({type:'bpm',bpm:m.bpm}); }
function onBpmDown(id,delta,e){ e.stopPropagation(); e.preventDefault(); changeBpm(id,delta); bpmPressTimer=setTimeout(()=>{ bpmRapidInterval=setInterval(()=>changeBpm(id,delta),60); },600); }
function onBpmUp(){ clearTimeout(bpmPressTimer); bpmPressTimer=null; clearInterval(bpmRapidInterval); bpmRapidInterval=null; }
function changeBpm(id,delta){ if(!metros[id]) return; metros[id].bpm=Math.max(20,Math.min(300,metros[id].bpm+delta)); const el=document.getElementById('bpm-'+id); if(el) el.innerText=metros[id].bpm; sendBpm(id); autosave(); }
function commitBpm(id,el){ const v=parseInt(el.innerText.replace(/\D/g,'')); metros[id].bpm=isNaN(v)?metros[id].bpm:Math.max(20,Math.min(300,v)); el.innerText=metros[id].bpm; sendBpm(id); autosave(); }
function liveUpdateBpm(id,el){ const raw=el.innerText.replace(/\D/g,''); if(!raw) return; const v=parseInt(raw); if(!isNaN(v)&&v>=20&&v<=300){ metros[id].bpm=v; sendBpm(id); } }

/* ══ TAP ══ */
function tapTempo(id){
  ensureAudio().catch(()=>{});
  const card=document.getElementById('card-'+id);
  card.classList.remove('flash-tap'); void card.offsetWidth; card.classList.add('flash-tap');
  setTimeout(()=>card.classList.remove('flash-tap'),90);
  const now=performance.now();
  if(!tapTimesMap[id]) tapTimesMap[id]=[];
  const arr=tapTimesMap[id];
  if(arr.length&&now-arr[arr.length-1]>3000) arr.length=0;
  arr.push(now); if(arr.length>8) arr.shift();
  if(arr.length>=2){
    let sum=0; for(let i=1;i<arr.length;i++) sum+=arr[i]-arr[i-1];
    metros[id].bpm=Math.max(20,Math.min(300,Math.round(60000/(sum/(arr.length-1)))));
    document.getElementById('bpm-'+id).innerText=metros[id].bpm;
    sendBpm(id); autosave();
  }
}

/* ══ 콘티 파싱 ══ */
function parseConti(raw){
  const urlRe=/(https?:\/\/[^\s]+)/gi;
  const songs=[]; let cur=null;
  const lines=raw.split('\n').map(l=>l.trim()).filter(Boolean);
  for(let i=0;i<lines.length;i++){
    const line=lines[i];
    const isUrl=urlRe.test(line); urlRe.lastIndex=0;
    const numMatch=line.match(/^(\d+)[.$、\s]/);
    if(numMatch){
      if(cur) songs.push(cur);
      const inlineUrls=line.match(/(https?:\/\/[^\s]+)/g);
      const titlePart=line.replace(/^(\d+)[.$、\s]+/,'').replace(/(https?:\/\/[^\s]+)/g,'').trim();
      cur={title:titlePart||('Song '+(songs.length+1)),urls:inlineUrls||[]};
    } else if(isUrl){
      const urls=line.match(/(https?:\/\/[^\s]+)/g)||[];
      if(cur) cur.urls.push(...urls);
      else cur={title:'Song '+(songs.length+1),urls};
    } else {
      if(cur){ if(!cur.title||cur.title.startsWith('Song ')) cur.title=line; else cur.title+=' '+line; }
      else cur={title:line,urls:[]};
    }
  }
  if(cur) songs.push(cur);
  const result=[];
  songs.forEach(s=>{
    if(s.urls.length===0) result.push({title:s.title,vId:null});
    else if(s.urls.length===1) result.push({title:s.title,vId:extractVid(s.urls[0])});
    else s.urls.forEach((url,idx)=>result.push({title:s.title+(idx===0?'':` (${idx+1})`),vId:extractVid(url)}));
  });
  return result;
}

function analyzeConti(){
  const text=document.getElementById('conti-input').value.trim(); if(!text) return;
  Object.keys(metros).forEach(id=>{ if(metros[id].isPlaying) stopMetro(+id); });
  metros={}; tapTimesMap={}; globalSongId=0;
  document.getElementById('workspace').innerHTML='';
  const items=parseConti(text);
  items.forEach(item=>{ globalSongId++; createCard(globalSongId, item.title, item.vId); });
  renderEmptyState();
  setTimeout(updatePanelWidth,300);
  autosave();
}
function addEmptyCard(){
  removeEmptyState(); globalSongId++;
  createCard(globalSongId, 'Song '+globalSongId, null);
  setTimeout(updatePanelWidth,300); autosave();
}
function removeEmptyState(){ document.querySelector('.empty-state')?.remove(); }
function renderEmptyState(){
  const ws=document.getElementById('workspace');
  if(!ws.querySelector('.song-card'))
    ws.innerHTML='<div class="empty-state"><div class="empty-state-icon">🎹</div><div class="empty-state-text">카드가 없습니다.<br>[+ Add Empty]로 카드를 추가하세요.</div></div>';
}

/* ══ 썸네일 (우측 버튼 정렬 & 유튜브 꽉 차게) ══ */
function buildThumb(id,vId){
  metros[id].vId=vId||null;
  const section=document.getElementById('thumb-'+id); if(!section) return;
  section.querySelectorAll('img,.youtube-iframe').forEach(el=>el.remove());
  const center=section.querySelector('.thumb-center'); if(center) center.innerHTML='';
  const actions=section.querySelector('.thumb-actions'); if(actions) actions.innerHTML='';
  
  if(vId){
    const img=document.createElement('img');
    const urls=['hqdefault','mqdefault','default'].map(q=>`https://img.youtube.com/vi/${vId}/${q}.jpg`);
    let ti=0; img.src=urls[0]; img.alt=''; img.draggable=false;
    img.onerror=function(){ if(++ti<urls.length) this.src=urls[ti]; };
    center.appendChild(img);
    
    // iframe을 thumb-center 내부를 꽉 채우도록 삽입
    const iframe = document.createElement('iframe');
    iframe.className = 'youtube-iframe';
    iframe.src = `https://www.youtube.com/embed/${vId}?rel=0&playsinline=1`;
    iframe.allowFullscreen = true;
    iframe.allow = 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture';
    center.appendChild(iframe);
    
    // 우측 버튼: 복사, 링크, 삭제
    actions.innerHTML = `
      <button class="thumb-btn copy-btn" title="복사">⎘</button>
      <button class="thumb-btn link-btn" title="링크 열기">🔗</button>
      <button class="thumb-btn del-btn" title="삭제">✕</button>
    `;
    actions.querySelector('.link-btn').onclick=e=>{ e.stopPropagation(); window.open('https://www.youtube.com/watch?v='+vId,'_blank'); };
  } else {
    // 링크가 없을 경우
    if(center){
      const wrap=document.createElement('div'); wrap.className='no-thumb-content';
      wrap.innerHTML=`
        <span class="no-thumb-label">No Link</span>
        <input class="link-input-inline" id="linkinput-${id}" type="text" placeholder="유튜브 링크...">
        <button class="link-apply-btn">적용</button>
      `;
      wrap.querySelector('input').addEventListener('pointerdown',e=>e.stopPropagation());
      wrap.querySelector('input').addEventListener('keydown',e=>{ if(e.key==='Enter') applyLink(id); e.stopPropagation(); });
      wrap.querySelector('button').addEventListener('pointerdown',e=>e.stopPropagation());
      wrap.querySelector('button').addEventListener('click',()=>applyLink(id));
      center.appendChild(wrap);
    }
    
    // 우측 버튼: 복사, 삭제 (링크 버튼 생략)
    actions.innerHTML = `
      <button class="thumb-btn copy-btn" title="복사">⎘</button>
      <button class="thumb-btn del-btn" title="삭제">✕</button>
    `;
  }

  // 생성된 버튼들에 이벤트 리스너 재부착
  actions.querySelector('.copy-btn').addEventListener('click', e=>{ e.stopPropagation(); duplicateCard(id); });
  actions.querySelector('.del-btn').addEventListener('click', e=>{
    e.stopPropagation();
    const titleEl=document.getElementById('title-'+id);
    const titleText=titleEl?titleEl.innerText.trim():'이 카드';
    showConfirm('🗑️','카드를 삭제할까요?',`"${titleText}"\n정말로 삭제하시겠습니까?`,()=>deleteCard(id));
  });
}

function applyLink(id){
  const inp=document.getElementById('linkinput-'+id); if(!inp) return;
  const vId=extractVid(inp.value.trim());
  if(!vId){ inp.style.borderColor='#ff453a'; setTimeout(()=>inp.style.borderColor='',1800); return; }
  metros[id].vId=vId; buildThumb(id,vId); autosave();
}

/* ══ 상태 초기화 ══ */
function initStates(id){
  const m=metros[id];
  m.blockStates=Array.from({length:m.sig},(_,i)=>i===0?1:0);
  m.subStates=Array.from({length:m.sig},(_,i)=>{
    const arr = new Array(16).fill(0);
    if (i===0) arr[0] = 1;
    return arr;
  });
}

/* ══ 카드 생성 ══ */
function createCard(id,title,vId){
  removeEmptyState();
  metros[id]={
    isPlaying:false, bpm:120, sig:4, subDiv:1,
    vol:.7, muted:false, sound:'digital',
    workletNode:null, vId:vId||null,
    blockStates:[], subStates:[]
  };
  initStates(id);
  const ws=document.getElementById('workspace');
  const card=document.createElement('div');
  card.className='song-card'; card.id='card-'+id;
  card.innerHTML=cardHTML(id,title);
  ws.appendChild(card);
  buildThumb(id,vId); updateSubIcons(id); renderViz(id); bindEvents(card,id);
  setTimeout(updatePanelWidth,200);
}

/* ══ Sub 아이콘 ══ */
function updateSubIcons(id){
  const seg=document.getElementById('sub-seg-'+id); if(!seg) return;
  const m=metros[id]; if(!m) return;
  seg.querySelectorAll('.seg-btn').forEach(btn=>{
    const div=+btn.dataset.div;
    btn.innerHTML=getSubSvg(div, div===m.subDiv);
  });
}

/* ══════════════════════════════════════════
   드래그 & 드롭 (마우스 완전 재구현)
══════════════════════════════════════════ */
function initDrag(card,id){
  const handle=document.getElementById('handle-'+id);

  handle.addEventListener('mousedown', e=>{
    if(e.button!==0) return;
    e.preventDefault(); e.stopPropagation();
    _mouseDragId=id; _mouseDragging=true;

    const rect=card.getBoundingClientRect();
    _mouseGhostOffX=e.clientX-rect.left;
    _mouseGhostOffY=e.clientY-rect.top;
    _mouseGhost=card.cloneNode(true);
    _mouseGhost.id='mouse-ghost';
    _mouseGhost.style.cssText=`
      position:fixed;pointer-events:none;z-index:9999;
      width:${rect.width}px;
      left:${rect.left}px;top:${rect.top}px;
      opacity:.78;transform:scale(1.03) rotate(0.8deg);
      border:2px solid var(--accent);
      box-shadow:0 12px 40px rgba(0,0,0,.6);
      border-radius:18px;overflow:hidden;transition:none;
    `;
    document.body.appendChild(_mouseGhost);
    card.classList.add('dragging');
    activateDim(id);
  });

  handle.addEventListener('touchstart', e=>{
    e.stopPropagation(); if(_touchDragId!=null) return;
    _touchDragId=id;
    const t=e.touches[0];
    const rect=card.getBoundingClientRect();
    _touchOffX=t.clientX-rect.left; _touchOffY=t.clientY-rect.top;
    _touchGhost=card.cloneNode(true); _touchGhost.id='touch-ghost';
    _touchGhost.style.cssText=`position:fixed;pointer-events:none;z-index:9999;width:${rect.width}px;left:${rect.left}px;top:${rect.top}px;opacity:.78;transform:scale(1.04) rotate(1.2deg);border:2px solid var(--accent);box-shadow:0 12px 40px rgba(0,0,0,.6);border-radius:18px;overflow:hidden;transition:none;`;
    document.body.appendChild(_touchGhost);
    card.classList.add('dragging'); activateDim(id); startAutoScroll();
  },{passive:true});

  handle.addEventListener('touchmove', e=>{
    if(_touchDragId!==id||!_touchGhost) return;
    e.preventDefault();
    const t=e.touches[0];
    _touchGhost.style.left=(t.clientX-_touchOffX)+'px';
    _touchGhost.style.top=(t.clientY-_touchOffY)+'px';
    updateAutoScrollDir(t.clientY);
    document.querySelectorAll('.song-card').forEach(c=>c.classList.remove('drag-over'));
    const el=document.elementFromPoint(t.clientX,t.clientY);
    const overCard=el?.closest('.song-card');
    if(overCard&&overCard.id!=='card-'+id) overCard.classList.add('drag-over');
  },{passive:false});

  handle.addEventListener('touchend', e=>{
    if(_touchDragId!==id) return;
    e.stopPropagation(); stopAutoScroll();
    const t=e.changedTouches[0];
    const el=document.elementFromPoint(t.clientX,t.clientY);
    const overCard=el?.closest('.song-card');
    if(overCard&&overCard.id!=='card-'+id){ reorder(id,+overCard.id.replace('card-','')); autosave(); }
    _touchGhost?.remove(); _touchGhost=null; _touchDragId=null;
    document.getElementById('card-'+id)?.classList.remove('dragging');
    document.querySelectorAll('.song-card').forEach(c=>c.classList.remove('drag-over'));
    deactivateDim();
  },{passive:true});
}

document.addEventListener('mousemove', e=>{
  if(!_mouseDragging||!_mouseGhost) return;
  _mouseGhost.style.left=(e.clientX-_mouseGhostOffX)+'px';
  _mouseGhost.style.top=(e.clientY-_mouseGhostOffY)+'px';
  _mouseGhost.style.display='none';
  const el=document.elementFromPoint(e.clientX,e.clientY);
  _mouseGhost.style.display='';
  document.querySelectorAll('.song-card').forEach(c=>c.classList.remove('drag-over'));
  const overCard=el?.closest('.song-card');
  if(overCard&&overCard.id!=='card-'+_mouseDragId) overCard.classList.add('drag-over');
  updateAutoScrollDir(e.clientY);
  if(_autoScrollRAF==null) startAutoScroll();
});

document.addEventListener('mouseup', e=>{
  if(!_mouseDragging) return;
  if(_mouseGhost) _mouseGhost.style.display='none';
  const el=document.elementFromPoint(e.clientX,e.clientY);
  if(_mouseGhost) _mouseGhost.style.display='';
  const overCard=el?.closest('.song-card');
  if(overCard&&overCard.id!=='card-'+_mouseDragId){
    reorder(_mouseDragId,+overCard.id.replace('card-',''));
    autosave();
  }
  _mouseGhost?.remove(); _mouseGhost=null;
  document.getElementById('card-'+_mouseDragId)?.classList.remove('dragging');
  document.querySelectorAll('.song-card').forEach(c=>c.classList.remove('drag-over'));
  deactivateDim();
  stopAutoScroll();
  _mouseDragging=false; _mouseDragId=null;
});

function updateAutoScrollDir(clientY){
  const vh=window.innerHeight;
  if(clientY<SCROLL_ZONE){
    _autoScrollDir=-1;
    document.getElementById('scroll-zone-top').classList.add('visible');
    document.getElementById('scroll-zone-bot').classList.remove('visible');
  } else if(clientY>vh-SCROLL_ZONE){
    _autoScrollDir=1;
    document.getElementById('scroll-zone-bot').classList.add('visible');
    document.getElementById('scroll-zone-top').classList.remove('visible');
  } else {
    _autoScrollDir=0;
    document.getElementById('scroll-zone-top').classList.remove('visible');
    document.getElementById('scroll-zone-bot').classList.remove('visible');
    if(_touchDragId==null&&_mouseDragId) stopAutoScroll();
  }
}
function startAutoScroll(){
  if(_autoScrollRAF) return;
  function frame(){
    if(_autoScrollDir!==0) window.scrollBy(0,_autoScrollDir*SCROLL_SPEED);
    _autoScrollRAF=requestAnimationFrame(frame);
  }
  _autoScrollRAF=requestAnimationFrame(frame);
}
function stopAutoScroll(){
  if(_autoScrollRAF){ cancelAnimationFrame(_autoScrollRAF); _autoScrollRAF=null; }
  _autoScrollDir=0;
  document.getElementById('scroll-zone-top').classList.remove('visible');
  document.getElementById('scroll-zone-bot').classList.remove('visible');
}

function reorder(srcId,tgtId){
  const ws=document.getElementById('workspace');
  const sc=document.getElementById('card-'+srcId);
  const tc=document.getElementById('card-'+tgtId);
  if(!sc||!tc) return;
  const all=[...ws.querySelectorAll('.song-card')];
  ws.insertBefore(sc, all.indexOf(sc)<all.indexOf(tc) ? tc.nextSibling : tc);
}
function activateDim(srcId){ document.querySelectorAll('.song-card').forEach(c=>{ if(c.id!=='card-'+srcId) c.classList.add('drag-dim'); }); }
function deactivateDim(){ document.querySelectorAll('.song-card').forEach(c=>c.classList.remove('drag-dim')); }

/* ══ 이벤트 바인딩 ══ */
function bindEvents(card,id){
  // 썸네일 액션버튼 리스너는 buildThumb에서 직접 부착함.

  const minus=card.querySelector('#bpm-minus-'+id);
  const plus=card.querySelector('#bpm-plus-'+id);
  minus.addEventListener('pointerdown',e=>onBpmDown(id,-1,e));
  plus.addEventListener('pointerdown',e=>onBpmDown(id,+1,e));
  ['pointerup','pointercancel','pointerleave'].forEach(ev=>{ minus.addEventListener(ev,onBpmUp); plus.addEventListener(ev,onBpmUp); });

  const bpmEl=card.querySelector('#bpm-'+id);
  bpmEl.addEventListener('blur',()=>commitBpm(id,bpmEl));
  bpmEl.addEventListener('input',()=>liveUpdateBpm(id,bpmEl));
  bpmEl.addEventListener('keydown',e=>{ if(e.key==='Enter'){ e.preventDefault(); bpmEl.blur(); } e.stopPropagation(); });
  bpmEl.addEventListener('pointerdown',e=>e.stopPropagation());

  card.querySelector('#sub-seg-'+id).addEventListener('click',e=>{
    const b=e.target.closest('.seg-btn'); if(!b) return;
    setSubDiv(id,+b.dataset.div);
  });
  card.querySelector('#beat-seg-'+id).addEventListener('click',e=>{
    const b=e.target.closest('.seg-btn'); if(!b) return;
    setBeat(id,+b.dataset.beat,b);
  });
  card.querySelector('#sound-seg-'+id).addEventListener('click',e=>{
    const b=e.target.closest('.seg-btn'); if(!b) return;
    setSound(id,b.dataset.sound,b);
  });

  card.querySelector('#vol-'+id).addEventListener('input',e=>{ metros[id].vol=+e.target.value; autosave(); });
  card.querySelector('#mute-'+id).addEventListener('click',()=>toggleMute(id));
  card.querySelector('#tap-btn-'+id).addEventListener('pointerdown',e=>{ e.preventDefault(); e.stopPropagation(); tapTempo(id); });
  card.querySelector('#p-btn-'+id).addEventListener('pointerdown',e=>{ e.preventDefault(); e.stopPropagation(); toggleMetro(id); });

  card.querySelector('.info-section').addEventListener('mousedown',e=>e.stopPropagation());
  card.querySelector('.info-section').addEventListener('pointerdown',e=>e.stopPropagation());

  const titleEl=card.querySelector('#title-'+id);
  titleEl.addEventListener('input',()=>autosave());

  initDrag(card,id);
}

/* ══ 삭제/복제 ══ */
function deleteCard(id){
  if(metros[id]?.isPlaying) stopMetro(id);
  delete metros[id]; delete tapTimesMap[id];
  const el=document.getElementById('card-'+id); if(!el) return;
  el.style.cssText+='transition:opacity .18s,transform .18s;opacity:0;transform:scale(.92);';
  setTimeout(()=>{ el.remove(); renderEmptyState(); updatePanelWidth(); autosave(); },200);
}
function duplicateCard(srcId){
  const m=metros[srcId]; if(!m) return;
  globalSongId++; const nid=globalSongId;
  createCard(nid,(document.getElementById('title-'+srcId)?.innerText.trim()||'Song')+' (copy)',m.vId||null);
  const nm=metros[nid];
  Object.assign(nm,{bpm:m.bpm,sig:m.sig,subDiv:m.subDiv,vol:m.vol,sound:m.sound});
  nm.blockStates=[...m.blockStates];
  nm.subStates=m.subStates.map(s=>[...s]);
  document.getElementById('bpm-'+nid).innerText=nm.bpm;
  document.getElementById('beat-seg-'+nid).querySelectorAll('.seg-btn').forEach(b=>b.classList.toggle('active',+b.dataset.beat===nm.sig));
  document.getElementById('sound-seg-'+nid).querySelectorAll('.seg-btn').forEach(b=>b.classList.toggle('active',b.dataset.sound===nm.sound));
  document.getElementById('vol-'+nid).value=nm.vol;
  updateSubIcons(nid); renderViz(nid); autosave();
}

/* ══ 설정 변경 ══ */
function setBeat(id,val,btnEl){
  const m=metros[id]; m.sig=val; initStates(id);
  document.getElementById('beat-seg-'+id).querySelectorAll('.seg-btn').forEach(b=>b.classList.remove('active'));
  btnEl.classList.add('active');
  renderViz(id);
  if(m.isPlaying&&m.workletNode) m.workletNode.port.postMessage({type:'sig',sig:val});
  autosave();
}

function setSubDiv(id,div){
  const m=metros[id]; if(!m) return;
  m.subDiv=div;
  m.subStates=Array.from({length:m.sig},(_,i)=>{
    const arr = new Array(16).fill(0);
    arr[0] = m.blockStates[i] ?? 0;
    return arr;
  });
  document.getElementById('sub-seg-'+id).querySelectorAll('.seg-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('sub-seg-'+id).querySelector(`[data-div="${div}"]`)?.classList.add('active');
  updateSubIcons(id); renderViz(id);
  if(m.isPlaying&&m.workletNode) m.workletNode.port.postMessage({type:'subDiv',subDiv:div});
  autosave();
}
function setSound(id,val,btnEl){
  metros[id].sound=val;
  document.getElementById('sound-seg-'+id).querySelectorAll('.seg-btn').forEach(b=>b.classList.remove('active'));
  btnEl.classList.add('active'); autosave();
}
function toggleMute(id){
  metros[id].muted=!metros[id].muted;
  const btn=document.getElementById('mute-'+id);
  btn.classList.toggle('muted',metros[id].muted);
  btn.innerText=metros[id].muted?'🔇':'🔊'; autosave();
}

/* ══ 비주얼라이저 (메인 블럭 종속성 완전히 제거) ══ */
function renderViz(id){
  const m=metros[id];
  const viz=document.getElementById('viz-'+id); if(!viz) return;
  viz.innerHTML='';
  for(let i=0;i<m.sig;i++){
    const b=document.createElement('div');
    b.id='block-'+id+'-'+i;

    let parentState = 0;
    if (m.subDiv === 1) {
      parentState = m.blockStates[i] ?? 0;
    }
    b.className='beat-block '+(parentState===0?'state-normal':parentState===1?'state-accent':'state-off');

    if(m.subDiv>1){
      for(let s=0;s<m.subDiv;s++){
        const ss=(m.subStates[i]?.[s])??0;
        const el=document.createElement('div');
        let slotCls='sub-slot';
        
        if(ss===2) slotCls+=' sub-off';
        else if(ss===1) slotCls+=' sub-accent';
        
        el.className=slotCls;
        el.id='sub-'+id+'-'+i+'-'+s;
        el.style.left=(s/m.subDiv*100)+'%';
        el.style.width=(100/m.subDiv)+'%';
        const _s=s;
        el.addEventListener('click',e=>{
          e.stopPropagation();
          m.subStates[i][_s]=(m.subStates[i][_s]+1)%3;
          if (_s === 0) {
            m.blockStates[i] = m.subStates[i][0];
          }
          renderViz(id); autosave();
        });
        b.appendChild(el);
      }
    } else {
      b.addEventListener('click',()=>cycleBlockState(id,i));
    }
    viz.appendChild(b);
  }
}

function cycleBlockState(id,i){
  const m = metros[id];
  m.blockStates[i]=(m.blockStates[i]+1)%3;
  if (m.subStates && m.subStates[i]) {
    m.subStates[i][0] = m.blockStates[i];
  }
  renderViz(id); autosave();
}

function clearVizFlash(id){
  document.querySelectorAll(`#viz-${id} .beat-block`).forEach(b=>b.classList.remove('flash-blue','flash-red'));
  document.querySelectorAll(`#viz-${id} .sub-slot`).forEach(b=>b.classList.remove('sub-flash','sub-flash-accent'));
}

/* ══ 세트리스트 ══ */
function extractSetlist(){
  const cards=document.getElementById('workspace').querySelectorAll('.song-card');
  if(!cards.length){ document.getElementById('setlist-output').value='카드가 없습니다.'; return; }
  const bl={1:'1/1',3:'3/4',4:'4/4',6:'6/8'};
  const sl={1:'4분음표',2:'8분음표',3:'셋잇단',4:'16분음표'};
  document.getElementById('setlist-output').value=[...cards].map(c=>{
    const id=+c.id.replace('card-',''); const m=metros[id]; if(!m) return'';
    return(document.getElementById('title-'+id)?.innerText||'제목없음').trim()+
      '  —  BPM: '+m.bpm+' | 박자: '+(bl[m.sig]||'4/4')+(m.subDiv>1?' ('+sl[m.subDiv]+')':'');
  }).filter(Boolean).join('\n');
}

/* ══ 커스텀 Confirm ══ */
function showConfirm(icon,title,msg,onConfirm){
  const overlay=document.createElement('div');
  overlay.className='modal-overlay';
  overlay.innerHTML=`
    <div class="modal-box">
      <div class="modal-icon">${icon}</div>
      <div class="modal-title">${escHtml(title)}</div>
      <div class="modal-msg">${escHtml(msg)}</div>
      <div class="modal-btns">
        <button class="modal-btn modal-btn-cancel">취소</button>
        <button class="modal-btn modal-btn-confirm">삭제</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  overlay.querySelector('.modal-btn-cancel').addEventListener('click',()=>overlay.remove());
  overlay.querySelector('.modal-btn-confirm').addEventListener('click',()=>{ overlay.remove(); onConfirm(); });
  overlay.addEventListener('click',e=>{ if(e.target===overlay) overlay.remove(); });
}

function escHtml(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/\n/g,'<br>');
}

  }
});
