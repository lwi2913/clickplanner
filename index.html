<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>클릭 플래너 Pro</title>
  <style>
    :root {
      --bg:#050505; --card-bg:#1c1c1c; --input-bg:#111;
      --accent:#00e5ff; --first-beat:#ff3333;
      --text:#ffffff; --sub-text:#bbbbbb; --border:#484848;
      --seg-bg:#303030; --seg-active:#555;
      --danger:#ff453a; --success:#30d158;
      --card-max:420px;
    }
    [data-theme="light"] {
      --bg:#f2f2f7; --card-bg:#fff; --input-bg:#fff;
      --accent:#007aff; --first-beat:#ff3b30;
      --text:#000; --sub-text:#555; --border:#c0c0c8;
      --seg-bg:#dcdce0; --seg-active:#fff;
      --danger:#ff3b30; --success:#34c759;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{
      background:var(--bg);color:var(--text);
      font-family:'Malgun Gothic','맑은 고딕',-apple-system,sans-serif;
      padding:24px 16px 120px;
      transition:background .3s,color .3s;
      min-height:100vh;
    }
    ::-webkit-scrollbar{width:6px;height:6px;}
    ::-webkit-scrollbar-track{background:transparent;}
    ::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
    header{text-align:center;margin-bottom:24px;position:relative;max-width:900px;margin-left:auto;margin-right:auto;}
    h1{color:var(--accent);font-size:2rem;font-weight:900;margin-bottom:4px;}
    .subtitle{color:var(--sub-text);font-size:12px;margin-bottom:16px;}
    .theme-switcher{position:absolute;top:0;right:0;background:var(--seg-bg);padding:4px;border-radius:10px;display:flex;gap:3px;}
    .theme-btn{border:none;background:transparent;color:var(--sub-text);padding:5px 10px;border-radius:7px;cursor:pointer;font-size:11px;font-weight:800;font-family:inherit;transition:.2s;}
    .theme-btn.active{background:var(--card-bg);color:var(--accent);}
    .input-panel{background:var(--card-bg);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:20px;max-width:900px;margin-left:auto;margin-right:auto;}
    .input-panel-title{font-size:11px;font-weight:800;letter-spacing:1.5px;color:var(--sub-text);text-transform:uppercase;margin-bottom:8px;}
    textarea{width:100%;min-height:72px;max-height:180px;background:var(--input-bg);color:var(--text);padding:10px 12px;border-radius:10px;border:1px solid var(--border);font-size:13px;font-family:inherit;resize:vertical;overflow-y:auto;line-height:1.6;}
    textarea:focus{outline:none;border-color:var(--accent);}
    textarea::placeholder{color:var(--sub-text);}
    .btn-row{display:flex;gap:8px;margin-top:10px;}
    .btn-primary{flex:2;background:var(--accent);color:#000;font-weight:900;font-size:14px;padding:11px;border:none;border-radius:10px;cursor:pointer;transition:opacity .2s,transform .1s;font-family:inherit;}
    .btn-primary:hover{opacity:.85;}
    .btn-primary:active{transform:scale(.97);}
    [data-theme="light"] .btn-primary{color:#fff;}
    .btn-secondary{flex:1;background:transparent;border:2px dashed var(--border);color:var(--sub-text);font-weight:800;border-radius:10px;cursor:pointer;transition:.2s;font-family:inherit;font-size:13px;}
    .btn-secondary:hover{border-color:var(--accent);color:var(--accent);}
    .workspace{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(min(300px,calc(50% - 10px)),var(--card-max)));
      gap:16px;
      justify-content:center;
      max-width:900px;
      margin:0 auto;
    }
    .song-card{
      background:var(--card-bg);border-radius:18px;overflow:hidden;
      border:1.5px solid var(--border);position:relative;
      transition:border-color .06s,box-shadow .2s;
      max-width:var(--card-max);width:100%;
    }
    .song-card:hover{box-shadow:0 6px 24px rgba(0,0,0,.4);}
    .song-card.dragging{opacity:.45;transform:scale(.96);}
    .song-card.drag-over{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,229,255,.3);}
    .song-card.drag-dim{opacity:.35;transform:scale(.93);transition:opacity .18s,transform .18s;}
    .song-card.flash-accent{background:rgba(0,229,255,.44)!important;border-color:var(--accent)!important;box-shadow:0 0 30px rgba(0,229,255,.65),inset 0 0 20px rgba(0,229,255,.28)!important;transition:background 0s,box-shadow 0s,border-color 0s!important;}
    .song-card.flash-first{background:rgba(255,40,40,.50)!important;border-color:#ff2222!important;box-shadow:0 0 30px rgba(255,40,40,.70),inset 0 0 20px rgba(255,40,40,.32)!important;transition:background 0s,box-shadow 0s,border-color 0s!important;}
    .song-card.flash-tap{background:rgba(255,205,0,.52)!important;border-color:#ffd700!important;box-shadow:0 0 30px rgba(255,205,0,.65),inset 0 0 20px rgba(255,205,0,.28)!important;transition:background 0s,box-shadow 0s,border-color 0s!important;}
    [data-theme="light"] .song-card.flash-accent{background:rgba(0,122,255,.28)!important;box-shadow:0 0 24px rgba(0,122,255,.5)!important;}
    [data-theme="light"] .song-card.flash-first{background:rgba(255,40,40,.26)!important;box-shadow:0 0 24px rgba(255,40,40,.5)!important;}
    .thumb-section{width:100%;height:108px;position:relative;background:#0a0a0a;display:flex;align-items:center;overflow:hidden;flex-shrink:0;}
    [data-theme="light"] .thumb-section{background:#c8c8d0;}
    .thumb-section>img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:.72;pointer-events:none;}
    .thumb-overlay{position:absolute;inset:0;pointer-events:none;background:linear-gradient(to right,rgba(0,0,0,.72) 0%,rgba(0,0,0,.12) 40%,rgba(0,0,0,.12) 60%,rgba(0,0,0,.72) 100%);}
    .drag-handle-zone{
      flex-shrink:0;display:flex;align-items:center;justify-content:center;
      width:54px;height:100%;z-index:3;cursor:grab;touch-action:none;
    }
    .drag-handle-zone:active{cursor:grabbing;}
    .drag-handle-icon{color:rgba(255,255,255,.7);font-size:24px;user-select:none;pointer-events:none;}
    .drag-handle-zone:hover .drag-handle-icon{color:var(--accent);}
    [data-theme="light"] .drag-handle-icon{color:rgba(0,0,0,.5);}
    .thumb-center{flex:1;min-width:0;display:flex;align-items:center;padding:0 6px;z-index:2;position:relative;}
    .thumb-actions{display:flex;gap:5px;z-index:4;padding-right:8px;flex-shrink:0;}
    .thumb-btn{background:rgba(0,0,0,.68);border:1px solid rgba(255,255,255,.22);color:#fff;border-radius:7px;padding:5px 9px;font-size:11px;font-weight:800;cursor:pointer;transition:background .18s,transform .1s;white-space:nowrap;font-family:inherit;line-height:1;}
    .thumb-btn:hover{transform:scale(1.07);}
    .thumb-btn.link-btn:hover{background:rgba(0,229,255,.5);}
    .thumb-btn.copy-btn:hover{background:rgba(48,209,88,.5);}
    .thumb-btn.del-btn:hover{background:rgba(255,69,58,.6);}
    [data-theme="light"] .thumb-btn{background:rgba(255,255,255,.8);border-color:rgba(0,0,0,.2);color:#111;}
    .no-thumb-content{display:flex;align-items:center;gap:6px;width:100%;}
    .no-thumb-label{color:var(--sub-text);font-size:10px;font-weight:800;white-space:nowrap;flex-shrink:0;}
    .link-input-inline{flex:1;min-width:0;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.18);color:#fff;border-radius:7px;padding:5px 8px;font-size:11px;font-family:inherit;outline:none;}
    .link-input-inline::placeholder{color:rgba(255,255,255,.3);}
    .link-input-inline:focus{border-color:var(--accent);}
    [data-theme="light"] .link-input-inline{background:rgba(0,0,0,.05);border-color:rgba(0,0,0,.2);color:#111;}
    .link-apply-btn{flex-shrink:0;background:var(--accent);color:#000;border:none;border-radius:7px;padding:5px 10px;font-size:10px;font-weight:900;cursor:pointer;font-family:inherit;}
    [data-theme="light"] .link-apply-btn{color:#fff;}
    .info-section{padding:14px 14px 12px;cursor:default;user-select:none;}
    .editable-title{font-size:1.2rem;font-weight:900;color:var(--accent);margin-bottom:12px;outline:none;border-radius:6px;padding:2px 4px;transition:background .2s;word-break:break-all;min-height:1.4em;}
    .editable-title:focus{background:var(--seg-bg);}
    .bpm-ctrl{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:12px;}
    .bpm-wrap{text-align:center;}
    .bpm-val{font-size:3.4rem;font-weight:900;min-width:100px;text-align:center;outline:none;letter-spacing:-2px;line-height:1;border-radius:8px;padding:2px 4px;transition:background .2s;}
    .bpm-val:focus{background:var(--seg-bg);}
    .bpm-unit{font-size:10px;font-weight:800;color:var(--sub-text);letter-spacing:2px;margin-top:2px;}
    .step-btn{width:48px;height:48px;border-radius:12px;border:none;background:var(--seg-bg);color:var(--text);font-size:24px;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s,transform .1s;user-select:none;touch-action:none;}
    .step-btn:hover{background:var(--seg-active);}
    .step-btn:active{transform:scale(.88);background:var(--accent);color:#000;}
    .beat-visualizer{display:flex;width:100%;height:24px;gap:3px;margin-bottom:16px;}
    .beat-block{flex:1;background:#484848;border-radius:5px;position:relative;overflow:hidden;cursor:pointer;transition:background .08s,box-shadow .08s;}
    [data-theme="light"] .beat-block{background:#b0b0b8;}
    .beat-block.state-accent{background:rgba(255,55,55,.22)!important;box-shadow:0 0 0 2.5px #ff3333 inset!important;}
    .beat-block.state-off{background:#252525!important;opacity:.38;}
    [data-theme="light"] .beat-block.state-off{background:#c0c0c8!important;opacity:.35;}
    .beat-block.state-off::after{content:'';position:absolute;inset:0;background:repeating-linear-gradient(45deg,rgba(255,255,255,.07) 0px,rgba(255,255,255,.07) 2px,transparent 2px,transparent 6px);border-radius:5px;pointer-events:none;}
    .active-accent{background:var(--accent)!important;box-shadow:0 0 12px var(--accent)!important;}
    .active-red{background:#ff3333!important;box-shadow:0 0 14px #ff3333!important;}
    .sub-block{position:absolute;top:0;width:50%;height:100%;background:transparent;cursor:pointer;}
    .sub-left{left:0;border-right:1px solid var(--card-bg);}
    .sub-right{right:0;}
    .sub-block.state-off{background:rgba(0,0,0,.52)!important;opacity:.42;}
    @keyframes redPulse{
      0%  {box-shadow:0 0 0 2.5px #ff3333 inset,0 0 4px rgba(255,51,51,.4);}
      50% {box-shadow:0 0 0 2.5px #ff5555 inset,0 0 14px rgba(255,51,51,.85),inset 0 0 8px rgba(255,80,80,.45);}
      100%{box-shadow:0 0 0 2.5px #ff3333 inset,0 0 4px rgba(255,51,51,.4);}
    }
    .beat-block.state-accent.beat-active-flash{animation:redPulse .12s ease-out forwards;}
    .setting-group{display:flex;flex-direction:column;gap:11px;margin-bottom:14px;}
    .setting-row{display:flex;justify-content:space-between;align-items:center;}
    .setting-label{font-size:13px;font-weight:900;letter-spacing:.6px;color:var(--text);min-width:56px;text-transform:uppercase;}
    .segmented-control{display:flex;background:var(--seg-bg);border-radius:10px;padding:3px;gap:2px;flex:1;margin-left:10px;}
    .seg-btn{flex:1;border:none;background:transparent;color:var(--sub-text);padding:7px 0;border-radius:7px;cursor:pointer;font-size:12px;font-weight:800;font-family:inherit;transition:.2s;}
    .seg-btn:hover:not(.active){color:var(--text);}
    .seg-btn.active{background:var(--seg-active);color:var(--text);box-shadow:0 1px 5px rgba(0,0,0,.3);}
    .switch{position:relative;display:inline-block;width:58px;height:32px;}
    .switch input{opacity:0;width:0;height:0;}
    .slider{position:absolute;cursor:pointer;inset:0;background:var(--seg-bg);border:1px solid var(--border);transition:.28s;border-radius:32px;}
    .slider:before{position:absolute;content:"";height:24px;width:24px;left:3px;bottom:3px;background:white;transition:.28s cubic-bezier(.4,1.4,.6,1);border-radius:50%;box-shadow:0 1px 4px rgba(0,0,0,.3);}
    input:checked+.slider{background:var(--accent);border-color:var(--accent);}
    input:checked+.slider:before{transform:translateX(26px);}
    .vol-container{display:flex;align-items:center;gap:8px;flex:1;margin-left:10px;}
    .mute-btn{background:var(--seg-bg);border:1px solid var(--border);border-radius:8px;font-size:15px;cursor:pointer;color:var(--text);padding:4px 8px;transition:background .2s;}
    .mute-btn:hover{background:var(--seg-active);}
    .mute-btn.muted{background:rgba(255,69,58,.22);border-color:var(--danger);}
    input[type="range"]{flex:1;height:5px;cursor:pointer;accent-color:var(--accent);}
    .btn-group{display:flex;gap:8px;}
    .btn{flex:1;padding:20px 8px;border-radius:14px;border:none;font-weight:900;font-size:1rem;cursor:pointer;font-family:inherit;letter-spacing:1.2px;text-transform:uppercase;user-select:none;-webkit-user-select:none;touch-action:manipulation;transition:opacity .1s,transform .08s,background .1s,box-shadow .1s;}
    .btn:active{transform:scale(.93);}
    .btn-tap{background:var(--seg-bg);color:var(--text);border:1.5px solid var(--border);}
    .btn-tap:active{background:rgba(255,205,0,.6)!important;border-color:#ffd700!important;color:#000!important;}
    .btn-play{background:#1a7fff;color:#fff;}
    .btn-play:hover{opacity:.88;}
    .btn-play.active{background:var(--first-beat);box-shadow:0 0 16px rgba(255,51,51,.5);}
    .setlist-panel{max-width:900px;margin:28px auto 0;background:var(--card-bg);border:1px solid var(--border);border-radius:16px;padding:16px;}
    .setlist-panel-title{font-size:11px;font-weight:800;letter-spacing:1.5px;color:var(--sub-text);text-transform:uppercase;margin-bottom:10px;}
    .setlist-output{width:100%;min-height:90px;max-height:220px;background:var(--input-bg);color:var(--text);padding:10px 12px;border-radius:10px;border:1px solid var(--border);font-size:12px;font-family:'Malgun Gothic',monospace,sans-serif;resize:vertical;overflow-y:auto;line-height:1.8;margin-top:8px;}
    .setlist-output:focus{outline:none;border-color:var(--accent);}
    .empty-state{grid-column:1/-1;text-align:center;padding:50px 20px;color:var(--sub-text);}
    .empty-state-icon{font-size:2.8rem;margin-bottom:10px;opacity:.4;}
    .empty-state-text{font-size:13px;font-weight:700;opacity:.6;line-height:1.7;}
    @media(max-width:400px){
      h1{font-size:1.5rem;}
      .theme-switcher{position:static;margin:0 auto 12px;width:fit-content;}
      .bpm-val{font-size:2.8rem;}
    }
  </style>
</head>
<body data-theme="dark">
<header>
  <h1>클릭 플래너 Pro</h1>
  <p class="subtitle">Live Worship Click Planner — AudioWorklet Edition</p>
  <div class="theme-switcher">
    <button class="theme-btn active" onclick="setTheme('dark',this)">Dark</button>
    <button class="theme-btn" onclick="setTheme('light',this)">Light</button>
  </div>
  <div class="input-panel" style="margin-top:14px;">
    <div class="input-panel-title">📋 콘티 입력</div>
    <textarea id="conti-input" placeholder="예시:&#10;1. 시선 https://youtu.be/xxxxxx&#10;2. 주의 이름 높이어&#10;3. 거룩 https://youtu.be/yyyyyy&#10;&#10;번호+제목 또는 번호+제목+링크 형식 후 [플래너 생성]"></textarea>
    <div class="btn-row">
      <button class="btn-primary" onclick="analyzeConti()">🎼 플래너 생성</button>
      <button class="btn-secondary" onclick="addEmptyCard()">＋ Add Empty</button>
    </div>
  </div>
</header>

<div class="workspace" id="workspace">
  <div class="empty-state">
    <div class="empty-state-icon">🎹</div>
    <div class="empty-state-text">콘티를 입력하고 [플래너 생성]을 누르거나<br>[+ Add Empty]로 카드를 추가하세요.</div>
  </div>
</div>

<div class="setlist-panel">
  <div class="setlist-panel-title">📤 세트리스트 추출</div>
  <button class="btn-primary" style="width:100%;padding:11px;" onclick="extractSetlist()">Setlist 텍스트로 요약 추출하기</button>
  <textarea class="setlist-output" id="setlist-output" readonly placeholder="추출된 세트리스트가 여기에 표시됩니다..."></textarea>
</div>

<script>
'use strict';

const WORKLET_CODE = `
class ClickProcessor extends AudioWorkletProcessor {
  constructor() {
    super();
    this._bpm=120; this._sub=false; this._sig=4;
    this._running=false; this._beatIdx=0;
    this._countdown=0; this._samplesPerBeat=0;
    this.port.onmessage = (e)=>{
      const d=e.data;
      if(d.type==='start'){
        this._bpm=d.bpm; this._sub=d.sub; this._sig=d.sig;
        this._running=true; this._beatIdx=0; this._countdown=0;
        this._updateSPB();
      } else if(d.type==='stop'){
        this._running=false; this._beatIdx=0;
      } else if(d.type==='bpm'){
        this._bpm=d.bpm; this._updateSPB();
        if(this._countdown>this._samplesPerBeat) this._countdown=this._samplesPerBeat;
      } else if(d.type==='sub'){
        this._sub=d.sub; this._updateSPB();
        const total=this._sub?this._sig*2:this._sig;
        this._beatIdx=this._beatIdx%total;
      } else if(d.type==='sig'){
        this._sig=d.sig; this._beatIdx=0; this._updateSPB();
      }
    };
  }
  _updateSPB(){
    const bps=(this._bpm/60)*(this._sub?2:1);
    this._samplesPerBeat=Math.round(sampleRate/bps);
  }
  process(inputs,outputs,parameters){
    if(!this._running) return true;
    const blockSize=(outputs[0][0]?outputs[0][0].length:128);
    let i=0;
    while(i<blockSize){
      if(this._countdown<=0){
        const offsetSec=i/sampleRate;
        this.port.postMessage({type:'beat',beatIdx:this._beatIdx,offsetSec});
        const total=this._sub?this._sig*2:this._sig;
        this._beatIdx=(this._beatIdx+1)%total;
        this._countdown=this._samplesPerBeat;
      }
      const step=Math.min(this._countdown,blockSize-i);
      this._countdown-=step; i+=step;
    }
    return true;
  }
}
registerProcessor('click-processor',ClickProcessor);
`;

let audioCtx=null, workletReady=false;
let metros={};
let globalSongId=0;
let dragSrcId=null;
let tapTimesMap={};
let bpmPressTimer=null;
let bpmRapidInterval=null;
let bpmLastTap={};

async function getAudioCtx(){
  if(audioCtx){ if(audioCtx.state==='suspended') await audioCtx.resume(); return audioCtx; }
  audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  const blob=new Blob([WORKLET_CODE],{type:'application/javascript'});
  const url=URL.createObjectURL(blob);
  await audioCtx.audioWorklet.addModule(url);
  URL.revokeObjectURL(url);
  workletReady=true;
  return audioCtx;
}

async function startMetro(id){
  const ctx=await getAudioCtx();
  const m=metros[id];
  const node=new AudioWorkletNode(ctx,'click-processor');
  m.workletNode=node;
  node.connect(ctx.destination);
  node.port.onmessage=(e)=>{
    if(e.data.type!=='beat') return;
    if(!metros[id]||!metros[id].isPlaying) return;
    const beatTime=ctx.currentTime+e.data.offsetSec+0.005;
    handleBeat(id,e.data.beatIdx,beatTime);
  };
  node.port.postMessage({type:'start',bpm:m.bpm,sub:m.sub,sig:m.sig});
  m.isPlaying=true; m.beatIdx=0;
  const btn=document.getElementById('p-btn-'+id);
  if(btn){btn.innerText='STOP';btn.classList.add('active');}
}

function stopMetro(id){
  const m=metros[id]; if(!m) return;
  if(m.workletNode){
    m.workletNode.port.postMessage({type:'stop'});
    m.workletNode.disconnect(); m.workletNode=null;
  }
  m.isPlaying=false; m.beatIdx=0;
  const btn=document.getElementById('p-btn-'+id);
  if(btn){btn.innerText='START';btn.classList.remove('active');}
  clearViz(id);
  const card=document.getElementById('card-'+id);
  if(card) card.classList.remove('flash-accent','flash-first');
}

function toggleMetro(id){
  const m=metros[id]; if(!m) return;
  if(m.isPlaying) stopMetro(id); else startMetro(id);
}

function handleBeat(id,rawBeatIdx,beatTime){
  const m=metros[id]; if(!m) return;
  const ctx=audioCtx;
  const isMain=m.sub?(rawBeatIdx%2===0):true;
  const qIdx=m.sub?Math.floor(rawBeatIdx/2):rawBeatIdx;
  let isOff, isAccent;
  if(m.sub){
    const subSlot=isMain?0:1;
    const ss=m.subStates[qIdx]?.[subSlot]??0;
    isOff=(ss===1);
    isAccent=false;
  } else {
    const blockState=m.blockStates[qIdx]??0;
    isOff=(blockState===2);
    isAccent=(blockState===1);
  }
  const isHigh=isAccent;
  if(!m.muted&&!isOff) playSound(m.sound,isHigh,isMain?m.vol:m.vol*0.32,beatTime);
  const delayMs=Math.max(0,(beatTime-ctx.currentTime)*1000);
  setTimeout(()=>{
    if(!metros[id]?.isPlaying) return;
    if(isMain&&!isOff){
      const card=document.getElementById('card-'+id);
      if(card){
        card.classList.remove('flash-accent','flash-first');
        void card.offsetWidth;
        card.classList.add(isAccent?'flash-first':'flash-accent');
        setTimeout(()=>card.classList.remove('flash-accent','flash-first'),80);
      }
    }
    clearViz(id);
    if(!isOff){
      if(!m.sub){
        const blk=document.getElementById('block-'+id+'-'+qIdx);
        if(blk){
          if(isAccent){
            blk.classList.add('beat-active-flash');
            setTimeout(()=>blk.classList.remove('beat-active-flash'),130);
          } else {
            blk.classList.add('active-accent');
          }
        }
      } else {
        const side=isMain?'L':'R';
        document.getElementById('sub-'+id+'-'+qIdx+'-'+side)?.classList.add('active-accent');
      }
    }
  },delayMs);
}

function playSound(type,isHigh,vol,t){
  const ctx=audioCtx; if(!ctx) return;
  t=t||ctx.currentTime;
  const gain=ctx.createGain(); gain.connect(ctx.destination);
  if(type==='digital'){
    const osc=ctx.createOscillator();
    osc.type='square';
    osc.frequency.setValueAtTime(isHigh?1050:720,t);
    osc.connect(gain);
    gain.gain.setValueAtTime(vol*.5,t);
    gain.gain.exponentialRampToValueAtTime(0.001,t+.06);
    osc.start(t); osc.stop(t+.07);
  } else if(type==='wood'){
    const bufLen=Math.floor(ctx.sampleRate*.07);
    const buf=ctx.createBuffer(1,bufLen,ctx.sampleRate);
    const data=buf.getChannelData(0);
    for(let k=0;k<bufLen;k++) data[k]=(Math.random()*2-1)*Math.exp(-k/(bufLen*.15));
    const noise=ctx.createBufferSource(); noise.buffer=buf;
    const bp=ctx.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=isHigh?1600:1100; bp.Q.value=18;
    const hp=ctx.createBiquadFilter(); hp.type='highpass'; hp.frequency.value=800;
    const osc=ctx.createOscillator(); osc.type='triangle';
    osc.frequency.setValueAtTime(isHigh?1400:950,t);
    osc.frequency.exponentialRampToValueAtTime(200,t+.025);
    const og=ctx.createGain();
    og.gain.setValueAtTime(vol*1.4,t); og.gain.exponentialRampToValueAtTime(0.001,t+.03);
    noise.connect(bp); bp.connect(hp); hp.connect(gain);
    osc.connect(og); og.connect(gain);
    gain.gain.setValueAtTime(vol*2.5,t); gain.gain.exponentialRampToValueAtTime(0.001,t+.06);
    noise.start(t); noise.stop(t+.07); osc.start(t); osc.stop(t+.035);
  } else {
    const osc=ctx.createOscillator(); osc.type='sine';
    osc.frequency.value=isHigh?1320:880;
    osc.connect(gain);
    gain.gain.setValueAtTime(vol*1.1,t); gain.gain.exponentialRampToValueAtTime(0.001,t+.09);
    osc.start(t); osc.stop(t+.1);
  }
}

function sendBpmToWorklet(id){
  const m=metros[id];
  if(m?.isPlaying&&m.workletNode) m.workletNode.port.postMessage({type:'bpm',bpm:m.bpm});
}

function onBpmPointerDown(id,delta,e){
  e.stopPropagation();
  const now=performance.now();
  if(bpmLastTap[id]&&now-bpmLastTap[id]<400){
    bpmLastTap[id]=0;
    changeBpm(id,delta*10);
    return;
  }
  bpmLastTap[id]=now;
  changeBpm(id,delta);
  bpmPressTimer=setTimeout(()=>{
    bpmRapidInterval=setInterval(()=>changeBpm(id,delta),60);
  },700);
}
function onBpmPointerUp(){
  clearTimeout(bpmPressTimer); bpmPressTimer=null;
  clearInterval(bpmRapidInterval); bpmRapidInterval=null;
}
function changeBpm(id,delta){
  if(!metros[id]) return;
  metros[id].bpm=Math.max(20,Math.min(300,metros[id].bpm+delta));
  const el=document.getElementById('bpm-'+id); if(el) el.innerText=metros[id].bpm;
  sendBpmToWorklet(id);
}
function commitBpm(id,el){
  const v=parseInt(el.innerText.replace(/\D/g,''));
  metros[id].bpm=isNaN(v)?metros[id].bpm:Math.max(20,Math.min(300,v));
  el.innerText=metros[id].bpm; sendBpmToWorklet(id);
}
function liveUpdateBpm(id,el){
  const raw=el.innerText.replace(/\D/g,''); if(!raw) return;
  const v=parseInt(raw);
  if(!isNaN(v)&&v>=20&&v<=300){metros[id].bpm=v;sendBpmToWorklet(id);}
}

function tapTempo(id){
  getAudioCtx();
  const card=document.getElementById('card-'+id);
  card.classList.remove('flash-tap'); void card.offsetWidth;
  card.classList.add('flash-tap');
  setTimeout(()=>card.classList.remove('flash-tap'),90);
  const now=performance.now();
  if(!tapTimesMap[id]) tapTimesMap[id]=[];
  const arr=tapTimesMap[id];
  if(arr.length&&now-arr[arr.length-1]>3000) arr.length=0;
  arr.push(now); if(arr.length>8) arr.shift();
  if(arr.length>=2){
    let sum=0;
    for(let i=1;i<arr.length;i++) sum+=arr[i]-arr[i-1];
    metros[id].bpm=Math.max(20,Math.min(300,Math.round(60000/(sum/(arr.length-1)))));
    document.getElementById('bpm-'+id).innerText=metros[id].bpm;
    sendBpmToWorklet(id);
  }
}

function setTheme(t,btn){
  document.body.setAttribute('data-theme',t);
  document.querySelectorAll('.theme-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}

function extractVid(url){
  if(!url) return null;
  const m=url.match(/(?:youtube\.com\/(?:watch\?v=|shorts\/)|youtu\.be\/)([a-zA-Z0-9_-]{11})/i);
  return m?m[1]:null;
}

function analyzeConti(){
  const text=document.getElementById('conti-input').value.trim(); if(!text) return;
  Object.keys(metros).forEach(id=>{if(metros[id].isPlaying) stopMetro(+id);});
  metros={}; tapTimesMap={}; globalSongId=0;
  document.getElementById('workspace').innerHTML='';
  const urlRe=/(https?:\/\/[^\s]+)/gi;
  text.split('\n').map(l=>l.trim()).filter(Boolean).forEach(line=>{
    const um=line.match(urlRe), rawUrl=um?um[0]:null;
    const vId=rawUrl?extractVid(rawUrl):null;
    const title=line.replace(urlRe,'').trim().replace(/\s+/g,' ').trim()||('Song '+(globalSongId+1));
    globalSongId++; createCard(globalSongId,title,vId);
  });
  renderEmptyState();
}
function addEmptyCard(){removeEmptyState();globalSongId++;createCard(globalSongId,'Song '+globalSongId,null);}
function removeEmptyState(){document.querySelector('.empty-state')?.remove();}
function renderEmptyState(){

    const img=document.createElement('img');

    let ti=0; img.src=urls[0]; img.alt=''; img.draggable=false;
    img.onerror=function(){if(++ti<urls.length) this.src=urls[ti];};
    section.insertBefore(img,section.firstChild);
    const ov=document.createElement('div'); ov.className='thumb-overlay';
    section.insertBefore(ov,section.querySelector('.drag-handle-zone'));

function applyLink(id){

function initBlockStates(id){

  m.blockStates=Array.from({length:m.sig},(_,i)=>i===0?1:0);
  m.subStates=Array.from({length:m.sig},()=>[0,0]);

function bindCardEvents(card,id){
  card.querySelector('.del-btn') .addEventListener('click',e=>{e.stopPropagation();deleteCard(id);});
  card.querySelector('.copy-btn').addEventListener('click',e=>{e.stopPropagation();duplicateCard(id);});
  const minus=card.querySelector('#bpm-minus-'+id);
  const plus =card.querySelector('#bpm-plus-'+id);
  minus.addEventListener('pointerdown',e=>onBpmPointerDown(id,-1,e));
  plus .addEventListener('pointerdown',e=>onBpmPointerDown(id,+1,e));
  ['pointerup','pointercancel','pointerleave'].forEach(ev=>{
    minus.addEventListener(ev,onBpmPointerUp);
    plus .addEventListener(ev,onBpmPointerUp);
  });
  const bpmEl=card.querySelector('#bpm-'+id);
  bpmEl.addEventListener('blur',()=>commitBpm(id,bpmEl));
  bpmEl.addEventListener('input',()=>liveUpdateBpm(id,bpmEl));
  bpmEl.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();bpmEl.blur();}e.stopPropagation();});
  bpmEl.addEventListener('pointerdown',e=>e.stopPropagation());
  card.querySelector('#beat-seg-'+id).addEventListener('click',e=>{const b=e.target.closest('.seg-btn');if(b) setBeat(id,+b.dataset.beat,b);});
  card.querySelector('#sub-chk-'+id).addEventListener('change',e=>toggleSub(id,e.target.checked));
  card.querySelector('#sound-seg-'+id).addEventListener('click',e=>{const b=e.target.closest('.seg-btn');if(b) setSound(id,b.dataset.sound,b);});
  card.querySelector('#vol-'+id).addEventListener('input',e=>{metros[id].vol=+e.target.value;});
  card.querySelector('#mute-'+id).addEventListener('click',()=>toggleMute(id));
  card.querySelector('#tap-btn-'+id).addEventListener('pointerdown',e=>{e.preventDefault();e.stopPropagation();tapTempo(id);});
  card.querySelector('#p-btn-'+id).addEventListener('pointerdown',e=>{e.preventDefault();e.stopPropagation();toggleMetro(id);});
  card.querySelector('.info-section')      .addEventListener('pointerdown',e=>e.stopPropagation());
  card.querySelector('#thumb-center-'+id)  .addEventListener('pointerdown',e=>e.stopPropagation());
  card.querySelector('.thumb-actions')     .addEventListener('pointerdown',e=>e.stopPropagation());
  initDrag(card,id);
}

function deleteCard(id){
  if(metros[id]?.isPlaying) stopMetro(id);
  delete metros[id]; delete tapTimesMap[id];
  const el=document.getElementById('card-'+id); if(!el) return;
  el.style.cssText+='transition:opacity .18s,transform .18s;opacity:0;transform:scale(.92);';
  setTimeout(()=>{el.remove();renderEmptyState();},200);
}
function duplicateCard(srcId){
  const m=metros[srcId]; if(!m) return;
  globalSongId++; const nid=globalSongId;
  createCard(nid,(document.getElementById('title-'+srcId).innerText.trim()||'Song')+' (copy)',m.vId||null);
  const nm=metros[nid];
  Object.assign(nm,{bpm:m.bpm,sig:m.sig,sub:m.sub,vol:m.vol,sound:m.sound});
  nm.blockStates=[...m.blockStates];
  nm.subStates=m.subStates.map(s=>[...s]);
  document.getElementById('bpm-'+nid).innerText=nm.bpm;
  document.getElementById('beat-seg-'+nid).querySelectorAll('.seg-btn').forEach(b=>b.classList.toggle('active',+b.dataset.beat===nm.sig));
  const sc=document.getElementById('sub-chk-'+nid); if(sc) sc.checked=nm.sub;
  document.getElementById('sound-seg-'+nid).querySelectorAll('.seg-btn').forEach(b=>b.classList.toggle('active',b.dataset.sound===nm.sound));
  const vr=document.getElementById('vol-'+nid); if(vr) vr.value=nm.vol;
  renderViz(nid);
}

let _touchDragId=null;
let _touchGhost=null;
let _touchOffX=0,_touchOffY=0;

function initDrag(card,id){
  const handle=document.getElementById('handle-'+id);

  handle.addEventListener('mousedown',()=>card.setAttribute('draggable','true'));
  document.addEventListener('mouseup',()=>{
    document.querySelectorAll('.song-card').forEach(c=>c.setAttribute('draggable','false'));
  });
  card.addEventListener('dragstart',e=>{
    if(card.getAttribute('draggable')!=='true'){e.preventDefault();return;}
    dragSrcId=id; card.classList.add('dragging');
    e.dataTransfer.effectAllowed='move';
    activateDragDim(id);
  });
  card.addEventListener('dragend',()=>{
    card.setAttribute('draggable','false');
    card.classList.remove('dragging');
    deactivateDragDim();
    document.querySelectorAll('.song-card').forEach(c=>c.classList.remove('drag-over'));
  });
  card.addEventListener('dragover',e=>{
    e.preventDefault();
    if(+card.id.replace('card-','')!==dragSrcId) card.classList.add('drag-over');
  });
  card.addEventListener('dragleave',()=>card.classList.remove('drag-over'));
  card.addEventListener('drop',e=>{
    e.preventDefault(); card.classList.remove('drag-over');
    const tgt=+card.id.replace('card-','');
    if(dragSrcId==null||dragSrcId===tgt) return;
    reorderCards(dragSrcId,tgt);
    dragSrcId=null;
  });

  handle.addEventListener('touchstart',e=>{
    e.stopPropagation();
    if(_touchDragId!=null) return;
    _touchDragId=id;
    const t=e.touches[0];
    const rect=card.getBoundingClientRect();
    _touchOffX=t.clientX-rect.left;
    _touchOffY=t.clientY-rect.top;
    _touchGhost=card.cloneNode(true);
    _touchGhost.id='touch-ghost';
    _touchGhost.style.cssText=`
      position:fixed;pointer-events:none;z-index:9999;
      width:${rect.width}px;
      left:${rect.left}px;top:${rect.top}px;
      opacity:.78;transform:scale(1.04) rotate(1.5deg);
      border:2px solid var(--accent);box-shadow:0 12px 40px rgba(0,0,0,.6);
      border-radius:18px;overflow:hidden;transition:none;
    `;
    document.body.appendChild(_touchGhost);
    card.classList.add('dragging');
    activateDragDim(id);
  },{passive:true});

  handle.addEventListener('touchmove',e=>{
    if(_touchDragId!==id||!_touchGhost) return;
    e.preventDefault();
    const t=e.touches[0];
    _touchGhost.style.left=(t.clientX-_touchOffX)+'px';
    _touchGhost.style.top =(t.clientY-_touchOffY)+'px';
    document.querySelectorAll('.song-card').forEach(c=>c.classList.remove('drag-over'));
    const el=document.elementFromPoint(t.clientX,t.clientY);
    const overCard=el?.closest('.song-card');
    if(overCard&&overCard.id!=='card-'+id) overCard.classList.add('drag-over');
  },{passive:false});

  handle.addEventListener('touchend',e=>{
    if(_touchDragId!==id) return;
    e.stopPropagation();
    const t=e.changedTouches[0];
    const el=document.elementFromPoint(t.clientX,t.clientY);
    const overCard=el?.closest('.song-card');
    if(overCard&&overCard.id!=='card-'+id){
      const tgt=+overCard.id.replace('card-','');
      reorderCards(id,tgt);
    }
    _touchGhost?.remove(); _touchGhost=null;
    _touchDragId=null;
    document.getElementById('card-'+id)?.classList.remove('dragging');
    document.querySelectorAll('.song-card').forEach(c=>c.classList.remove('drag-over'));
    deactivateDragDim();
  },{passive:true});
}

function reorderCards(srcId,tgtId){
  const ws=document.getElementById('workspace');
  const sc=document.getElementById('card-'+srcId);
  const tc=document.getElementById('card-'+tgtId);
  if(!sc||!tc) return;
  const all=[...ws.querySelectorAll('.song-card')];
  ws.insertBefore(sc,all.indexOf(sc)<all.indexOf(tc)?tc.nextSibling:tc);
}
function activateDragDim(srcId){
  document.querySelectorAll('.song-card').forEach(c=>{
    if(c.id!=='card-'+srcId) c.classList.add('drag-dim');
  });
}
function deactivateDragDim(){
  document.querySelectorAll('.song-card').forEach(c=>c.classList.remove('drag-dim'));
}

function setBeat(id,val,btnEl){
  const m=metros[id]; m.sig=val; m.beatIdx=0;
  initBlockStates(id);
  document.getElementById('beat-seg-'+id).querySelectorAll('.seg-btn').forEach(b=>b.classList.remove('active'));
  btnEl.classList.add('active'); renderViz(id);
  if(m.isPlaying&&m.workletNode) m.workletNode.port.postMessage({type:'sig',sig:val});
}
function setSound(id,val,btnEl){
  metros[id].sound=val;
  document.getElementById('sound-seg-'+id).querySelectorAll('.seg-btn').forEach(b=>b.classList.remove('active'));
  btnEl.classList.add('active');
}
function toggleSub(id,checked){
  const m=metros[id]; m.sub=checked;
  if(checked){
    for(let i=0;i<m.sig;i++){
      const bs=m.blockStates[i];
      m.subStates[i][0]=(bs===2)?1:0;
      m.subStates[i][1]=0;
    }
  }
  renderViz(id);
  if(m.isPlaying&&m.workletNode) m.workletNode.port.postMessage({type:'sub',sub:checked});
}
function toggleMute(id){
  metros[id].muted=!metros[id].muted;
  const btn=document.getElementById('mute-'+id);
  btn.classList.toggle('muted',metros[id].muted);
  btn.innerText=metros[id].muted?'🔇':'🔊';
}

function getBlockStateClass(st){ return st===1?'state-accent':st===2?'state-off':''; }

function renderViz(id){
  const m=metros[id];
  const viz=document.getElementById('viz-'+id); if(!viz) return;
  viz.innerHTML='';
  for(let i=0;i<m.sig;i++){
    const b=document.createElement('div');
    const stC=getBlockStateClass(m.blockStates[i]);
    b.className='beat-block'+(stC?' '+stC:'');
    b.id='block-'+id+'-'+i;
    if(m.sub){
      for(let s=0;s<2;s++){
        const ss=m.subStates[i][s];
        const el=document.createElement('div');
        el.className='sub-block '+(s===0?'sub-left':'sub-right');
        el.id='sub-'+id+'-'+i+'-'+(s===0?'L':'R');
        if(ss===1) el.classList.add('state-off');
        const si=s;
        el.addEventListener('click',e=>{e.stopPropagation();cycleSubState(id,i,si);});
        b.appendChild(el);
      }
    } else {
      b.addEventListener('click',()=>cycleBlockState(id,i));
    }
    viz.appendChild(b);
  }
}
function cycleBlockState(id,i){
  metros[id].blockStates[i]=(metros[id].blockStates[i]+1)%3;
  const b=document.getElementById('block-'+id+'-'+i); if(!b) return;
  b.className='beat-block';
  const stC=getBlockStateClass(metros[id].blockStates[i]);
  if(stC) b.classList.add(stC);
}
function cycleSubState(id,i,side){
  metros[id].subStates[i][side]=(metros[id].subStates[i][side]+1)%2;
  renderViz(id);
}
function clearViz(id){
  document.querySelectorAll('#viz-'+id+' .beat-block').forEach(b=>b.classList.remove('active-accent','active-red','beat-active-flash'));
  document.querySelectorAll('#viz-'+id+' .sub-block') .forEach(b=>b.classList.remove('active-accent','active-red'));
}

function extractSetlist(){
  const cards=document.getElementById('workspace').querySelectorAll('.song-card');
  if(!cards.length){document.getElementById('setlist-output').value='카드가 없습니다.';return;}
  const bl={1:'1/1',3:'3/4',4:'4/4',6:'6/8'};
  document.getElementById('setlist-output').value=[...cards].map(c=>{
    const id=+c.id.replace('card-',''); const m=metros[id]; if(!m) return '';
    return (document.getElementById('title-'+id)?.innerText||'제목없음').trim()+
      '  —  BPM: '+m.bpm+' | 박자: '+(bl[m.sig]||'4/4')+(m.sub?' (8분음표)':'');
  }).filter(Boolean).join('\n');
}

function escHtml(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
