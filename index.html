<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>클릭 플래너</title>
  <style>
    :root {
      --bg:#050505; --card-bg:#1c1c1c; --input-bg:#111;
      --accent:#00e5ff; --first-beat:#ff3333;
      --text:#ffffff; --sub-text:#bbbbbb; --border:#484848;
      --seg-bg:#303030; --seg-active:#555;
      --danger:#ff453a; --success:#30d158;
    }
    [data-theme="light"] {
      --bg:#f2f2f7; --card-bg:#fff; --input-bg:#fff;
      --accent:#007aff; --first-beat:#ff3b30;
      --text:#000; --sub-text:#555; --border:#c0c0c8;
      --seg-bg:#dcdce0; --seg-active:#fff;
      --danger:#ff3b30; --success:#34c759;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{
      background:var(--bg);color:var(--text);
      font-family:'Malgun Gothic','맑은 고딕',-apple-system,sans-serif;
      padding:24px 16px 120px;
      transition:background .3s,color .3s;
      min-height:100vh;
    }
    ::-webkit-scrollbar{width:6px;}
    ::-webkit-scrollbar-track{background:transparent;}
    ::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}

    header{text-align:center;margin-bottom:24px;position:relative;max-width:1800px;margin-left:auto;margin-right:auto;}
    h1{color:var(--accent);font-size:2rem;font-weight:900;margin-bottom:4px;}
    .subtitle{color:var(--sub-text);font-size:12px;margin-bottom:16px;}
    .theme-switcher{position:absolute;top:0;right:0;background:var(--seg-bg);padding:4px;border-radius:10px;display:flex;gap:3px;}
    .theme-btn{border:none;background:transparent;color:var(--sub-text);padding:5px 10px;border-radius:7px;cursor:pointer;font-size:11px;font-weight:800;font-family:inherit;transition:.2s;}
    .theme-btn.active{background:var(--card-bg);color:var(--accent);}

    /* ══ 입력 패널 ══ */
    .input-panel{
      background:var(--card-bg);border:1px solid var(--border);border-radius:16px;
      padding:16px;margin-bottom:20px;max-width:1800px;margin-left:auto;margin-right:auto;
    }
    .input-panel-title{font-size:11px;font-weight:800;letter-spacing:1.5px;color:var(--sub-text);text-transform:uppercase;margin-bottom:8px;}

    /* 텍스트 에어리어 최대높이 = 카드 2개 너비 기반 (동적으로 JS에서도 조정) */
    textarea{
      width:100%;
      min-height:72px;
      max-height:var(--ta-max, 360px); /* JS에서 카드 2개 높이로 업데이트 */
      background:var(--input-bg);color:var(--text);
      padding:10px 12px;border-radius:10px;border:1px solid var(--border);
      font-size:13px;font-family:inherit;resize:vertical;overflow-y:auto;line-height:1.6;
    }
    textarea:focus{outline:none;border-color:var(--accent);}
    textarea::placeholder{color:var(--sub-text);}
    .btn-row{display:flex;gap:8px;margin-top:10px;}
    .btn-primary{flex:2;background:var(--accent);color:#000;font-weight:900;font-size:14px;padding:11px;border:none;border-radius:10px;cursor:pointer;transition:opacity .2s,transform .1s;font-family:inherit;}
    .btn-primary:hover{opacity:.85;}
    .btn-primary:active{transform:scale(.97);}
    [data-theme="light"] .btn-primary{color:#fff;}
    .btn-secondary{flex:1;background:transparent;border:2px dashed var(--border);color:var(--sub-text);font-weight:800;border-radius:10px;cursor:pointer;transition:.2s;font-family:inherit;font-size:13px;}
    .btn-secondary:hover{border-color:var(--accent);color:var(--accent);}

    /* ══ 워크스페이스 그리드 ══ */
    .workspace{
      display:grid;gap:16px;justify-content:center;
      max-width:1800px;margin:0 auto;
      grid-template-columns:repeat(auto-fill,minmax(280px,420px));
    }
    /* 폴드 세로 내부 화면 (~800px): 2열 */
    @media(max-width:800px){
      .workspace{grid-template-columns:repeat(2,1fr);}
    }
    /* 폴드 세로보다 2cm 더 작은 폭 (~600px): 1열 */
    @media(max-width:600px){
      .workspace{grid-template-columns:1fr;}
    }

    /* ══ 카드 ══ */
    .song-card{background:var(--card-bg);border-radius:18px;overflow:hidden;border:1.5px solid var(--border);position:relative;transition:border-color .06s,box-shadow .2s;width:100%;}
    .song-card:hover{box-shadow:0 6px 24px rgba(0,0,0,.4);}
    .song-card.dragging{opacity:.45;transform:scale(.96);}
    .song-card.drag-over{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,229,255,.3);}
    .song-card.drag-dim{opacity:.35;transform:scale(.93);transition:opacity .18s,transform .18s;}
    .song-card.flash-accent{background:rgba(0,229,255,.44)!important;border-color:var(--accent)!important;box-shadow:0 0 30px rgba(0,229,255,.65),inset 0 0 20px rgba(0,229,255,.28)!important;transition:background 0s,box-shadow 0s,border-color 0s!important;}
    .song-card.flash-first{background:rgba(255,40,40,.50)!important;border-color:#ff2222!important;box-shadow:0 0 30px rgba(255,40,40,.70),inset 0 0 20px rgba(255,40,40,.32)!important;transition:background 0s,box-shadow 0s,border-color 0s!important;}
    .song-card.flash-tap{background:rgba(255,205,0,.52)!important;border-color:#ffd700!important;box-shadow:0 0 30px rgba(255,205,0,.65)!important;transition:background 0s,box-shadow 0s,border-color 0s!important;}

    /* ══ 썸네일 ══ */
    .thumb-section{width:100%;height:108px;position:relative;background:#0a0a0a;display:flex;align-items:center;overflow:hidden;flex-shrink:0;}
    [data-theme="light"] .thumb-section{background:#c8c8d0;}
    .thumb-section>img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:.72;pointer-events:none;}
    .thumb-overlay{position:absolute;inset:0;pointer-events:none;background:linear-gradient(to right,rgba(0,0,0,.72) 0%,rgba(0,0,0,.12) 40%,rgba(0,0,0,.12) 60%,rgba(0,0,0,.72) 100%);}

    /* 드래그 핸들 1.5배 */
    .drag-handle-zone{flex-shrink:0;display:flex;align-items:center;justify-content:center;width:72px;height:100%;z-index:3;cursor:grab;touch-action:none;}
    .drag-handle-zone:active{cursor:grabbing;}
    .drag-handle-icon{color:rgba(255,255,255,.7);font-size:32px;user-select:none;pointer-events:none;}
    .drag-handle-zone:hover .drag-handle-icon{color:var(--accent);}
    [data-theme="light"] .drag-handle-icon{color:rgba(0,0,0,.5);}

    .thumb-center{flex:1;min-width:0;display:flex;align-items:center;padding:0 6px;z-index:2;position:relative;}
    .thumb-actions{display:flex;gap:5px;z-index:4;padding-right:8px;flex-shrink:0;}
    .thumb-btn{background:rgba(0,0,0,.68);border:1px solid rgba(255,255,255,.22);color:#fff;border-radius:7px;padding:5px 9px;font-size:11px;font-weight:800;cursor:pointer;transition:background .18s,transform .1s;white-space:nowrap;font-family:inherit;line-height:1;}
    .thumb-btn:hover{transform:scale(1.07);}
    .thumb-btn.link-btn:hover{background:rgba(0,229,255,.5);}
    .thumb-btn.copy-btn:hover{background:rgba(48,209,88,.5);}
    .thumb-btn.del-btn:hover{background:rgba(255,69,58,.6);}
    [data-theme="light"] .thumb-btn{background:rgba(255,255,255,.8);border-color:rgba(0,0,0,.2);color:#111;}
    .no-thumb-content{display:flex;align-items:center;gap:6px;width:100%;}
    .no-thumb-label{color:var(--sub-text);font-size:10px;font-weight:800;white-space:nowrap;flex-shrink:0;}
    .link-input-inline{flex:1;min-width:0;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.18);color:#fff;border-radius:7px;padding:5px 8px;font-size:11px;font-family:inherit;outline:none;}
    .link-input-inline::placeholder{color:rgba(255,255,255,.3);}
    .link-input-inline:focus{border-color:var(--accent);}
    [data-theme="light"] .link-input-inline{background:rgba(0,0,0,.05);border-color:rgba(0,0,0,.2);color:#111;}
    .link-apply-btn{flex-shrink:0;background:var(--accent);color:#000;border:none;border-radius:7px;padding:5px 10px;font-size:10px;font-weight:900;cursor:pointer;font-family:inherit;}
    [data-theme="light"] .link-apply-btn{color:#fff;}

    .info-section{padding:12px 12px 10px;cursor:default;user-select:none;}
    .editable-title{font-size:1.1rem;font-weight:900;color:var(--accent);margin-bottom:10px;outline:none;border-radius:6px;padding:2px 4px;transition:background .2s;word-break:break-all;min-height:1.4em;}
    .editable-title:focus{background:var(--seg-bg);}

    /* ══ BPM ══ */
    .bpm-ctrl{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:10px;}
    .bpm-wrap{text-align:center;}
    .bpm-val{font-size:3rem;font-weight:900;min-width:90px;text-align:center;outline:none;letter-spacing:-2px;line-height:1;border-radius:8px;padding:2px 4px;transition:background .2s;}
    .bpm-val:focus{background:var(--seg-bg);}
    .bpm-unit{font-size:10px;font-weight:800;color:var(--sub-text);letter-spacing:2px;margin-top:2px;}
    .step-btn{width:44px;height:44px;border-radius:12px;border:none;background:var(--seg-bg);color:var(--text);font-size:22px;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s,transform .1s;user-select:none;touch-action:none;}
    .step-btn:hover{background:var(--seg-active);}
    .step-btn:active{transform:scale(.88);background:var(--accent);color:#000;}

    /* ══ 비주얼라이저 ══ */
    .beat-visualizer{display:flex;width:100%;height:28px;gap:3px;margin-bottom:14px;}
    .beat-block{
      flex:1;border-radius:6px;position:relative;overflow:hidden;
      cursor:pointer;transition:background .08s,box-shadow .08s;
      background:#2a2a2a;
    }
    [data-theme="light"] .beat-block{background:#b8b8c0;}

    /* 기본(state=0): 파랑 */
    .beat-block.state-normal{
      background:rgba(0,180,255,.28)!important;
      box-shadow:0 0 0 2px rgba(0,200,255,.55) inset!important;
    }
    /* 강조(state=1): 빨강 */
    .beat-block.state-accent{
      background:rgba(255,55,55,.22)!important;
      box-shadow:0 0 0 2.5px #ff3333 inset!important;
    }
    /* 뮤트(state=2): 어둡게 */
    .beat-block.state-off{
      background:#1a1a1a!important;
      opacity:.4;
    }
    [data-theme="light"] .beat-block.state-off{background:#c8c8d0!important;opacity:.35;}

    /* 플래시 */
    .beat-block.flash-blue{
      background:var(--accent)!important;
      box-shadow:0 0 14px var(--accent)!important;
      transition:background 0s,box-shadow 0s!important;
    }
    .beat-block.flash-red{
      background:#ff3333!important;
      box-shadow:0 0 14px #ff3333!important;
      transition:background 0s,box-shadow 0s!important;
    }

    /* ══ Sub 슬롯 ══ */
    .sub-slot{
      position:absolute;top:0;height:100%;
      cursor:pointer;
      transition:background .08s;
      /* 기본: 파랑 활성 */
      background:rgba(0,160,255,.32);
    }
    .sub-slot:not(:first-child){border-left:2px solid var(--card-bg);}

    /* 뮤트된 서브 슬롯 */
    .sub-slot.sub-off{
      background:rgba(30,30,30,.85)!important;
      opacity:.38;
    }
    [data-theme="light"] .sub-slot.sub-off{background:rgba(200,200,208,.9)!important;}

    /* 서브 슬롯 플래시 */
    .sub-slot.sub-flash{
      background:var(--accent)!important;
      box-shadow:0 0 10px var(--accent)!important;
      transition:background 0s,box-shadow 0s!important;
    }

    /* ══ 설정 ══ */
    .setting-group{display:flex;flex-direction:column;gap:9px;margin-bottom:12px;}
    .setting-row{display:flex;justify-content:space-between;align-items:center;}
    .setting-label{font-size:12px;font-weight:900;letter-spacing:.6px;color:var(--text);min-width:52px;text-transform:uppercase;flex-shrink:0;}

    .segmented-control{display:flex;background:var(--seg-bg);border-radius:10px;padding:3px;gap:2px;flex:1;margin-left:8px;}
    .seg-btn{
      flex:1;border:none;background:transparent;color:var(--sub-text);
      padding:5px 2px;border-radius:7px;cursor:pointer;
      font-size:11px;font-weight:800;font-family:inherit;
      transition:.2s;white-space:nowrap;
      display:flex;align-items:center;justify-content:center;
      /* ★ 높이 고정으로 SUB 버튼 높이 통일 */
      height:42px;
    }
    .seg-btn:hover:not(.active){color:var(--text);}
    .seg-btn.active{background:var(--seg-active);color:var(--text);box-shadow:0 1px 5px rgba(0,0,0,.3);}
    .seg-btn svg{display:block;overflow:visible;}

    .vol-container{display:flex;align-items:center;gap:8px;flex:1;margin-left:8px;}
    .mute-btn{background:var(--seg-bg);border:1px solid var(--border);border-radius:8px;font-size:15px;cursor:pointer;color:var(--text);padding:4px 8px;transition:background .2s;}
    .mute-btn:hover{background:var(--seg-active);}
    .mute-btn.muted{background:rgba(255,69,58,.22);border-color:var(--danger);}
    input[type="range"]{flex:1;height:5px;cursor:pointer;accent-color:var(--accent);}

    /* ══ 플레이 버튼 ══ */
    .btn-group{display:flex;gap:8px;}
    .btn{flex:1;padding:18px 8px;border-radius:14px;border:none;font-weight:900;font-size:.95rem;cursor:pointer;font-family:inherit;letter-spacing:1.2px;text-transform:uppercase;user-select:none;-webkit-user-select:none;touch-action:manipulation;transition:opacity .1s,transform .08s,background .1s,box-shadow .1s;}
    .btn:active{transform:scale(.93);}
    .btn-tap{background:var(--seg-bg);color:var(--text);border:1.5px solid var(--border);}
    .btn-tap:active{background:rgba(255,205,0,.6)!important;border-color:#ffd700!important;color:#000!important;}
    .btn-play{background:#1a7fff;color:#fff;}
    .btn-play:hover{opacity:.88;}
    .btn-play.active{background:var(--first-beat);box-shadow:0 0 16px rgba(255,51,51,.5);}

    /* ══ 세트리스트 패널 ══ */
    .setlist-panel{max-width:1800px;margin:28px auto 0;background:var(--card-bg);border:1px solid var(--border);border-radius:16px;padding:16px;}
    .setlist-panel-title{font-size:11px;font-weight:800;letter-spacing:1.5px;color:var(--sub-text);text-transform:uppercase;margin-bottom:10px;}
    .setlist-output{
      width:100%;min-height:90px;
      max-height:var(--ta-max,360px);
      background:var(--input-bg);color:var(--text);
      padding:10px 12px;border-radius:10px;border:1px solid var(--border);
      font-size:12px;font-family:'Malgun Gothic',monospace,sans-serif;
      resize:vertical;overflow-y:auto;line-height:1.8;margin-top:8px;
    }
    .setlist-output:focus{outline:none;border-color:var(--accent);}
    .empty-state{grid-column:1/-1;text-align:center;padding:50px 20px;color:var(--sub-text);}
    .empty-state-icon{font-size:2.8rem;margin-bottom:10px;opacity:.4;}
    .empty-state-text{font-size:13px;font-weight:700;opacity:.6;line-height:1.7;}

    @media(max-width:400px){
      h1{font-size:1.5rem;}
      .theme-switcher{position:static;margin:0 auto 12px;width:fit-content;}
      .bpm-val{font-size:2.4rem;}
      .info-section{padding:10px 8px 8px;}
    }

    /* ══ 터치 드래그 자동 스크롤 표시기 ══ */
    #scroll-zone-top,#scroll-zone-bot{
      position:fixed;left:0;right:0;height:80px;z-index:8888;
      pointer-events:none;opacity:0;transition:opacity .2s;
    }
    #scroll-zone-top{top:0;background:linear-gradient(to bottom,rgba(0,229,255,.18),transparent);}
    #scroll-zone-bot{bottom:0;background:linear-gradient(to top,rgba(0,229,255,.18),transparent);}
    #scroll-zone-top.visible,#scroll-zone-bot.visible{opacity:1;}
  </style>
</head>
<body data-theme="dark">

<!-- 터치 드래그 스크롤 존 -->
<div id="scroll-zone-top"></div>
<div id="scroll-zone-bot"></div>

<header>
  <h1>클릭 플래너</h1>
  <p class="subtitle">Live Worship Click Planner — AudioWorklet Edition</p>
  <div class="theme-switcher">
    <button class="theme-btn active" onclick="setTheme('dark',this)">Dark</button>
    <button class="theme-btn" onclick="setTheme('light',this)">Light</button>
  </div>
  <div class="input-panel" style="margin-top:14px;">
    <div class="input-panel-title">📋 콘티 입력</div>
    <textarea id="conti-input" placeholder="예시:
1. 그 이름
https://youtu.be/xxxxx
2. 살아계신 주 https://youtu.be/yyyyy
3. Way Maker + 나의 주
https://youtu.be/aaaaaa
https://youtu.be/bbbbbb"></textarea>
    <div class="btn-row">
      <button class="btn-primary" onclick="analyzeConti()">🎼 플래너 생성</button>
      <button class="btn-secondary" onclick="addEmptyCard()">＋ Add Empty</button>
    </div>
  </div>
</header>

<div class="workspace" id="workspace">
  <div class="empty-state">
    <div class="empty-state-icon">🎹</div>
    <div class="empty-state-text">콘티를 입력하고 [플래너 생성]을 누르거나<br>[+ Add Empty]로 카드를 추가하세요.</div>
  </div>
</div>

<div class="setlist-panel">
  <div class="setlist-panel-title">📤 세트리스트 추출</div>
  <button class="btn-primary" style="width:100%;padding:11px;" onclick="extractSetlist()">Setlist 텍스트로 요약 추출하기</button>
  <textarea class="setlist-output" id="setlist-output" readonly placeholder="추출된 세트리스트가 여기에 표시됩니다..."></textarea>
</div>

<script>
'use strict';

/* ══════════════════════════════════════════════
   AudioWorklet Processor (Blob URL 방식)
══════════════════════════════════════════════ */
const WORKLET_CODE = `
class ClickProcessor extends AudioWorkletProcessor {
  constructor() {
    super();
    this._bpm=120; this._subDiv=1; this._sig=4;
    this._running=false; this._slotIdx=0; this._countdown=0;
    this._samplesPerBeat=0;
    this.port.onmessage = (e) => {
      const d=e.data;
      if(d.type==='start'){
        this._bpm=d.bpm; this._subDiv=d.subDiv; this._sig=d.sig;
        this._running=true; this._slotIdx=0; this._countdown=0;
        this._updateSPB();
      } else if(d.type==='stop'){
        this._running=false; this._slotIdx=0;
      } else if(d.type==='bpm'){
        this._bpm=d.bpm; this._updateSPB();
        if(this._countdown>this._samplesPerBeat) this._countdown=this._samplesPerBeat;
      } else if(d.type==='subDiv'){
        this._subDiv=d.subDiv; this._updateSPB();
        const total=this._sig*this._subDiv;
        this._slotIdx=this._slotIdx%total;
      } else if(d.type==='sig'){
        this._sig=d.sig; this._slotIdx=0; this._updateSPB();
      }
    };
  }
  _updateSPB(){
    const bps=(this._bpm/60)*this._subDiv;
    this._samplesPerBeat=Math.round(sampleRate/bps);
  }
  process(inputs,outputs){
    if(!this._running) return true;
    const bs=(outputs[0][0]?outputs[0][0].length:128);
    let i=0;
    while(i<bs){
      if(this._countdown<=0){
        this.port.postMessage({type:'beat',slotIdx:this._slotIdx,offsetSec:i/sampleRate});
        const total=this._sig*this._subDiv;
        this._slotIdx=(this._slotIdx+1)%total;
        this._countdown=this._samplesPerBeat;
      }
      const step=Math.min(this._countdown,bs-i);
      this._countdown-=step; i+=step;
    }
    return true;
  }
}
registerProcessor('click-processor',ClickProcessor);
`;

/* ══ 전역 상태 ══ */
let audioCtx = null;
let workletReady = false;
let gainMaster = null;       // 마스터 GainNode (증폭용)
let metros = {};
let globalSongId = 0;
let dragSrcId = null;
let tapTimesMap = {};
let bpmPressTimer = null;
let bpmRapidInterval = null;
let _touchDragId = null, _touchGhost = null, _touchOffX = 0, _touchOffY = 0;
let _autoScrollRAF = null;

/* ══════════════════════════════════════════════
   SVG 음표 아이콘 (이미지 레퍼런스 기반)
   - 모든 버튼 높이 42px에 맞는 비율로 설계
   - 선 굵기·음표 머리 크기 통일
══════════════════════════════════════════════ */

/* 공통 색 */
function nc(active){return active?'var(--text)':'var(--sub-text)';}

/* ♩ 4분음표 — 기둥 + 타원 머리 */
function svgQuarter(active){
  const c=nc(active);
  return `<svg width="20" height="34" viewBox="0 0 20 34" xmlns="http://www.w3.org/2000/svg">

/* ══ AudioContext & Worklet ══ */
async function ensureAudio(){
  if(!audioCtx){
    audioCtx = new (window.AudioContext||window.webkitAudioContext)();
    // 마스터 게인 (1.8 증폭 — 크롬 기본 1.0 한계 이상으로 DynamicsCompressor 우회)
    gainMaster = audioCtx.createGain();
    gainMaster.gain.value = 2.2; // 증폭
    const comp = audioCtx.createDynamicsCompressor();
    comp.threshold.value = -6;
    comp.knee.value = 3;
    comp.ratio.value = 4;
    comp.attack.value = 0.001;
    comp.release.value = 0.1;
    gainMaster.connect(comp);
    comp.connect(audioCtx.destination);
  }
  if(audioCtx.state==='suspended') await audioCtx.resume();
  if(!workletReady){
    const blob = new Blob([WORKLET_CODE],{type:'application/javascript'});
    const url = URL.createObjectURL(blob);
    await audioCtx.audioWorklet.addModule(url);
    URL.revokeObjectURL(url);
    workletReady = true;
  }
  return audioCtx;
}

/* ══ 메트로놈 시작/정지 ══ */
async function startMetro(id){
  const m=metros[id]; if(!m) return;
  try{
    const ctx = await ensureAudio();
    const node = new AudioWorkletNode(ctx,'click-processor');
    node.connect(ctx.destination); // worklet은 destination 직접 (사운드 재생은 별도)
    m.workletNode = node;
    node.port.onmessage = (e)=>{
      if(e.data.type!=='beat') return;
      if(!metros[id]?.isPlaying) return;
      const beatTime = ctx.currentTime + e.data.offsetSec + 0.005;
      handleBeat(id, e.data.slotIdx, beatTime);
    };
    node.port.postMessage({type:'start',bpm:m.bpm,subDiv:m.subDiv,sig:m.sig});
    m.isPlaying = true;
    const btn=document.getElementById('p-btn-'+id);
    if(btn){btn.innerText='STOP';btn.classList.add('active');}
  }catch(err){
    console.error('startMetro error:',err);
    alert('오디오 시작 실패: '+err.message);
  }
}
function stopMetro(id){
  const m=metros[id]; if(!m) return;
  if(m.workletNode){
    m.workletNode.port.postMessage({type:'stop'});
    try{m.workletNode.disconnect();}catch(e){}
    m.workletNode=null;
  }
  m.isPlaying=false;
  const btn=document.getElementById('p-btn-'+id);
  if(btn){btn.innerText='START';btn.classList.remove('active');}
  clearVizFlash(id);
}
function toggleMetro(id){
  if(metros[id]?.isPlaying) stopMetro(id); else startMetro(id);
}

/* ══ 박자 처리 ══ */
function handleBeat(id, slotIdx, beatTime){
  const m=metros[id]; if(!m||!audioCtx) return;
  const ctx=audioCtx;
  const div=m.subDiv;
  const qIdx=Math.floor(slotIdx/div); // 메인 비트 인덱스
  const sIdx=slotIdx%div;             // 서브 슬롯 인덱스
  const isMain=(sIdx===0);
  const bs=m.blockStates[qIdx]??0;   // 0=normal(파랑), 1=accent(빨강), 2=off(뮤트)

  let isOff=false, isAccent=false;

  if(div===1){
    // 4분음표: 블록 상태만 봄
    isOff   = (bs===2);
    isAccent= (bs===1);
  } else {
    if(isMain){
      // 서브 분할이 있을 때 메인 박자: 블록 상태 따름
      isOff   = (bs===2);
      isAccent= (bs===1);
    } else {
      // 서브 슬롯: subStates[qIdx][sIdx] 0=on(파랑), 1=off(뮤트)
      const ss = (m.subStates[qIdx]?.[sIdx]) ?? 0;
      isOff    = (ss===1);
      isAccent = false; // 서브는 절대 빨강 없음
    }
  }

  // 볼륨: 메인은 풀볼륨, 서브는 40%
  const vol = isMain ? m.vol : m.vol * 0.40;
  if(!m.muted && !isOff) playSound(m.sound, isAccent, vol, beatTime);

  // 시각 플래시 (딜레이 동기)
  const delayMs = Math.max(0,(beatTime - ctx.currentTime)*1000);
  setTimeout(()=>{
    if(!metros[id]?.isPlaying) return;

    // 카드 전체 플래시 (메인 박자만)
    if(isMain && !isOff){
      const card=document.getElementById('card-'+id);
      if(card){
        card.classList.remove('flash-accent','flash-first');
        void card.offsetWidth;
        card.classList.add(isAccent?'flash-first':'flash-accent');
        setTimeout(()=>card.classList.remove('flash-accent','flash-first'),80);
      }
    }

    // 비주얼라이저 플래시
    clearVizFlash(id);
    if(!isOff){
      if(div===1){
        // 4분음표: 메인 블록 플래시
        const blk=document.getElementById('block-'+id+'-'+qIdx);
        if(blk){
          blk.classList.add(isAccent?'flash-red':'flash-blue');
          setTimeout(()=>blk.classList.remove('flash-blue','flash-red'),120);
        }
      } else {
        if(isMain){
          // 서브 분할 중 메인: 첫 번째 서브슬롯 플래시
          const subEl=document.getElementById('sub-'+id+'-'+qIdx+'-0');
          if(subEl){
            subEl.classList.add('sub-flash');
            setTimeout(()=>subEl.classList.remove('sub-flash'),120);
          }
        } else {
          // 서브 슬롯 플래시
          const subEl=document.getElementById('sub-'+id+'-'+qIdx+'-'+sIdx);
          if(subEl){
            subEl.classList.add('sub-flash');
            setTimeout(()=>subEl.classList.remove('sub-flash'),100);
          }
        }
      }
    }
  }, delayMs);
}

/* ══ 소리 합성 (GainNode를 gainMaster에 연결) ══ */
function playSound(type, isHigh, vol, t){
  if(!audioCtx||!gainMaster) return;
  t = t||audioCtx.currentTime;
  const gain = audioCtx.createGain();
  gain.connect(gainMaster); // 마스터 게인으로 (증폭 적용)

  if(type==='digital'){
    const osc=audioCtx.createOscillator();
    osc.type='square';
    osc.frequency.setValueAtTime(isHigh?1050:720,t);
    osc.connect(gain);
    gain.gain.setValueAtTime(vol*.5,t);
    gain.gain.exponentialRampToValueAtTime(0.001,t+.06);
    osc.start(t);osc.stop(t+.07);
  } else if(type==='wood'){
    const bufLen=Math.floor(audioCtx.sampleRate*.07);
    const buf=audioCtx.createBuffer(1,bufLen,audioCtx.sampleRate);
    const data=buf.getChannelData(0);
    for(let k=0;k<bufLen;k++) data[k]=(Math.random()*2-1)*Math.exp(-k/(bufLen*.15));
    const noise=audioCtx.createBufferSource(); noise.buffer=buf;
    const bp=audioCtx.createBiquadFilter();bp.type='bandpass';bp.frequency.value=isHigh?1600:1100;bp.Q.value=18;
    const hp=audioCtx.createBiquadFilter();hp.type='highpass';hp.frequency.value=800;
    const osc=audioCtx.createOscillator();osc.type='triangle';
    osc.frequency.setValueAtTime(isHigh?1400:950,t);
    osc.frequency.exponentialRampToValueAtTime(200,t+.025);
    const og=audioCtx.createGain();
    og.gain.setValueAtTime(vol*1.4,t);og.gain.exponentialRampToValueAtTime(0.001,t+.03);
    noise.connect(bp);bp.connect(hp);hp.connect(gain);
    osc.connect(og);og.connect(gain);
    gain.gain.setValueAtTime(vol*2.5,t);gain.gain.exponentialRampToValueAtTime(0.001,t+.06);
    noise.start(t);noise.stop(t+.07);osc.start(t);osc.stop(t+.035);
  } else {
    const osc=audioCtx.createOscillator();
    osc.type='sine';osc.frequency.value=isHigh?1320:880;
    osc.connect(gain);
    gain.gain.setValueAtTime(vol*1.1,t);gain.gain.exponentialRampToValueAtTime(0.001,t+.09);
    osc.start(t);osc.stop(t+.1);
  }
}

/* ══ BPM 컨트롤 (press & hold만) ══ */
function sendBpm(id){
  const m=metros[id];
  if(m?.isPlaying&&m.workletNode) m.workletNode.port.postMessage({type:'bpm',bpm:m.bpm});
}
function onBpmDown(id,delta,e){
  e.stopPropagation();e.preventDefault();
  changeBpm(id,delta);
  bpmPressTimer=setTimeout(()=>{
    bpmRapidInterval=setInterval(()=>changeBpm(id,delta),60);
  },600);
}
function onBpmUp(){
  clearTimeout(bpmPressTimer);bpmPressTimer=null;
  clearInterval(bpmRapidInterval);bpmRapidInterval=null;
}
function changeBpm(id,delta){
  if(!metros[id]) return;
  metros[id].bpm=Math.max(20,Math.min(300,metros[id].bpm+delta));
  const el=document.getElementById('bpm-'+id);
  if(el) el.innerText=metros[id].bpm;
  sendBpm(id);
}
function commitBpm(id,el){
  const v=parseInt(el.innerText.replace(/\D/g,''));
  metros[id].bpm=isNaN(v)?metros[id].bpm:Math.max(20,Math.min(300,v));
  el.innerText=metros[id].bpm;sendBpm(id);
}
function liveUpdateBpm(id,el){
  const raw=el.innerText.replace(/\D/g,'');if(!raw)return;
  const v=parseInt(raw);if(!isNaN(v)&&v>=20&&v<=300){metros[id].bpm=v;sendBpm(id);}
}

/* ══ TAP ══ */
function tapTempo(id){
  ensureAudio().catch(()=>{});
  const card=document.getElementById('card-'+id);
  card.classList.remove('flash-tap');void card.offsetWidth;
  card.classList.add('flash-tap');
  setTimeout(()=>card.classList.remove('flash-tap'),90);
  const now=performance.now();
  if(!tapTimesMap[id]) tapTimesMap[id]=[];
  const arr=tapTimesMap[id];
  if(arr.length&&now-arr[arr.length-1]>3000) arr.length=0;
  arr.push(now);if(arr.length>8)arr.shift();
  if(arr.length>=2){
    let sum=0;for(let i=1;i<arr.length;i++) sum+=arr[i]-arr[i-1];
    metros[id].bpm=Math.max(20,Math.min(300,Math.round(60000/(sum/(arr.length-1)))));
    document.getElementById('bpm-'+id).innerText=metros[id].bpm;sendBpm(id);
  }
}

/* ══ 유튜브 ID 추출 ══ */
function extractVid(url){
  if(!url)return null;
  const m=url.match(/(?:youtube\.com\/(?:watch\?v=|shorts\/)|youtu\.be\/)([a-zA-Z0-9_-]{11})/i);
  return m?m[1]:null;
}

/* ══════════════════════════════════════════════
   콘티 파싱 알고리즘 (개선판)

   규칙:
   1. 번호(1. 2. 3. …)로 시작하는 줄 → 새 곡 시작
   2. URL 줄은 직전 곡에 붙임
   3. 번호 없는 텍스트 줄은:
      - 직전 줄이 URL이면 → 같은 곡의 추가 제목(concatenate)
      - 그냥 텍스트만 있으면 → 직전 곡의 제목에 합산
   4. 같은 곡에 URL이 2개이상 → "제목 (2)" 형태 카드 추가
══════════════════════════════════════════════ */
function parseConti(raw){
  const urlRe = /(https?:\/\/[^\s]+)/gi;
  const songs = [];
  let cur = null;

  const lines = raw.split('\n').map(l=>l.trim()).filter(Boolean);

  for(let i=0;i<lines.length;i++){
    const line = lines[i];
    const isUrl = urlRe.test(line); urlRe.lastIndex=0;
    const numMatch = line.match(/^(\d+)[.$、\s]/);

    if(numMatch){
      // 새 곡 시작
      if(cur) songs.push(cur);
      // 같은 줄에 URL이 있는 경우 처리
      const inlineUrls = line.match(/(https?:\/\/[^\s]+)/g);
      const titlePart = line.replace(/^(\d+)[.$、\s]+/,'').replace(/(https?:\/\/[^\s]+)/g,'').trim();
      cur = { title: titlePart||('Song '+(songs.length+1)), urls: inlineUrls||[] };
    } else if(isUrl){
      const urls = line.match(/(https?:\/\/[^\s]+)/g)||[];
      if(cur){
        cur.urls.push(...urls);
      } else {
        cur = { title:'Song '+(songs.length+1), urls };
      }
    } else {
      // 순수 텍스트 줄
      if(cur){
        // 직전 곡의 제목을 보강 (예: 번호 뒤 줄바꿈 후 제목)
        if(!cur.title||cur.title.startsWith('Song ')){
          cur.title = line;
        } else {
          cur.title += ' ' + line;
        }
      } else {
        cur = { title:line, urls:[] };
      }
    }
  }
  if(cur) songs.push(cur);

  // URL 2개 이상인 경우 → 카드 분리 (제목에 (2) 붙임)
  const result=[];
  songs.forEach(s=>{
    if(s.urls.length===0){
      result.push({title:s.title, vId:null});
    } else if(s.urls.length===1){
      result.push({title:s.title, vId:extractVid(s.urls[0])});
    } else {
      // 2개 이상
      s.urls.forEach((url,idx)=>{
        const suffix = idx===0?'':` (${idx+1})`;
        result.push({title:s.title+suffix, vId:extractVid(url)});
      });
    }
  });
  return result;
}

function analyzeConti(){
  const text=document.getElementById('conti-input').value.trim();if(!text)return;
  Object.keys(metros).forEach(id=>{if(metros[id].isPlaying)stopMetro(+id);});
  metros={};tapTimesMap={};globalSongId=0;
  document.getElementById('workspace').innerHTML='';
  const items=parseConti(text);
  items.forEach(item=>{
    globalSongId++;
    createCard(globalSongId,item.title,item.vId);
  });
  renderEmptyState();
  setTimeout(updateTextareaMaxHeight,300);
}
function addEmptyCard(){
  removeEmptyState();globalSongId++;
  createCard(globalSongId,'Song '+globalSongId,null);
  setTimeout(updateTextareaMaxHeight,300);
}
function removeEmptyState(){document.querySelector('.empty-state')?.remove();}
function renderEmptyState(){
  const ws=document.getElementById('workspace');
  if(!ws.querySelector('.song-card'))
    ws.innerHTML='<div class="empty-state"><div class="empty-state-icon">🎹</div><div class="empty-state-text">카드가 없습니다.<br>[+ Add Empty]로 카드를 추가하세요.</div></div>';
}

/* ══ 썸네일 ══ */
function buildThumb(id,vId){
  metros[id].vId=vId||null;
  const section=document.getElementById('thumb-'+id);if(!section)return;
  section.querySelectorAll('img,.thumb-overlay').forEach(el=>el.remove());
  const center=section.querySelector('.thumb-center');if(center)center.innerHTML='';
  if(vId){
    const img=document.createElement('img');
    const urls=['hqdefault','mqdefault','default'].map(q=>`https://img.youtube.com/vi/${vId}/${q}.jpg`);
    let ti=0;img.src=urls[0];img.alt='';img.draggable=false;
    img.onerror=function(){if(++ti<urls.length)this.src=urls[ti];};
    section.insertBefore(img,section.firstChild);
    const ov=document.createElement('div');ov.className='thumb-overlay';
    section.insertBefore(ov,section.querySelector('.drag-handle-zone'));
    if(center){
      const lb=document.createElement('button');
      lb.className='thumb-btn link-btn';lb.textContent='▶ Link';
      lb.onclick=e=>{e.stopPropagation();window.open('https://www.youtube.com/watch?v='+vId,'_blank');};
      lb.addEventListener('pointerdown',e=>e.stopPropagation());
      center.appendChild(lb);
    }
  } else {
    if(center){
      const wrap=document.createElement('div');wrap.className='no-thumb-content';
      wrap.innerHTML=`<span class="no-thumb-label">No Link</span><input class="link-input-inline" id="linkinput-${id}" type="text" placeholder="유튜브 링크..."><button class="link-apply-btn">적용</button>`;
      wrap.querySelector('input').addEventListener('pointerdown',e=>e.stopPropagation());
      wrap.querySelector('input').addEventListener('keydown',e=>{if(e.key==='Enter')applyLink(id);e.stopPropagation();});
      wrap.querySelector('button').addEventListener('pointerdown',e=>e.stopPropagation());
      wrap.querySelector('button').addEventListener('click',()=>applyLink(id));
      center.appendChild(wrap);
    }
  }
}
function applyLink(id){
  const inp=document.getElementById('linkinput-'+id);if(!inp)return;
  const vId=extractVid(inp.value.trim());
  if(!vId){inp.style.borderColor='#ff453a';setTimeout(()=>inp.style.borderColor='',1800);return;}
  buildThumb(id,vId);
}

/* ══ 상태 초기화 ══ */
function initStates(id){
  const m=metros[id];
  // blockStates: 0=normal(파랑), 1=accent(빨강), 2=off(뮤트)
  m.blockStates=Array.from({length:m.sig},(_,i)=>i===0?1:0);
  // subStates: 0=on(파랑), 1=off(뮤트)
  m.subStates=Array.from({length:m.sig},()=>new Array(16).fill(0));
}

/* ══ 카드 생성 ══ */
function createCard(id,title,vId){
  removeEmptyState();
  metros[id]={
    isPlaying:false,bpm:120,sig:4,subDiv:1,
    vol:.7,muted:false,sound:'digital',
    workletNode:null,vId:vId||null,
    blockStates:[],subStates:[]
  };
  initStates(id);

  const ws=document.getElementById('workspace');
  const card=document.createElement('div');
  card.className='song-card';card.id='card-'+id;
  card.innerHTML=`
    <div class="thumb-section" id="thumb-${id}">
      <div class="drag-handle-zone" id="handle-${id}"><span class="drag-handle-icon">⠿</span></div>
      <div class="thumb-center" id="thumb-center-${id}"></div>
      <div class="thumb-actions">
        <button class="thumb-btn copy-btn">⎘ Copy</button>
        <button class="thumb-btn del-btn">✕</button>
      </div>
    </div>
    <div class="info-section">
      <div class="editable-title" contenteditable="true" id="title-${id}" spellcheck="false">${escHtml(title)}</div>
      <div class="bpm-ctrl">
        <button class="step-btn" id="bpm-minus-${id}">−</button>
        <div class="bpm-wrap">
          <div class="bpm-val" contenteditable="true" id="bpm-${id}" inputmode="numeric" spellcheck="false">120</div>
          <div class="bpm-unit">BPM</div>
        </div>
        <button class="step-btn" id="bpm-plus-${id}">+</button>
      </div>
      <div class="beat-visualizer" id="viz-${id}"></div>
      <div class="setting-group">
        <div class="setting-row">
          <span class="setting-label">Sub</span>
          <div class="segmented-control" id="sub-seg-${id}">
            <button class="seg-btn active" data-div="1" title="4분음표"></button>
            <button class="seg-btn" data-div="2" title="8분음표"></button>
            <button class="seg-btn" data-div="3" title="셋잇단"></button>
            <button class="seg-btn" data-div="4" title="16분음표"></button>
          </div>
        </div>
        <div class="setting-row">
          <span class="setting-label">Meter</span>
          <div class="segmented-control" id="beat-seg-${id}">
            <button class="seg-btn" data-beat="1">1/1</button>
            <button class="seg-btn" data-beat="3">3/4</button>
            <button class="seg-btn active" data-beat="4">4/4</button>
            <button class="seg-btn" data-beat="6">6/8</button>
          </div>
        </div>
        <div class="setting-row">
          <span class="setting-label">Sound</span>
          <div class="segmented-control" id="sound-seg-${id}">
            <button class="seg-btn active" data-sound="digital">Digital</button>
            <button class="seg-btn" data-sound="wood">Wood</button>
            <button class="seg-btn" data-sound="beep">Beep</button>
          </div>
        </div>
        <div class="setting-row">
          <span class="setting-label">Volume</span>
          <div class="vol-container">
            <button class="mute-btn" id="mute-${id}">🔊</button>
            <input type="range" min="0" max="1" step="0.05" value="0.7" id="vol-${id}">
          </div>
        </div>
      </div>
      <div class="btn-group">
        <button class="btn btn-tap" id="tap-btn-${id}">TAP</button>
        <button class="btn btn-play" id="p-btn-${id}">START</button>
      </div>
    </div>`;

  ws.appendChild(card);
  buildThumb(id,vId);
  updateSubIcons(id);
  renderViz(id);
  bindEvents(card,id);
  setTimeout(updateTextareaMaxHeight,200);
}

/* ══ Sub 아이콘 업데이트 ══ */
function updateSubIcons(id){
  const seg=document.getElementById('sub-seg-'+id);if(!seg)return;
  const m=metros[id];if(!m)return;
  seg.querySelectorAll('.seg-btn').forEach(btn=>{
    const div=+btn.dataset.div;
    btn.innerHTML=getSubSvg(div, div===m.subDiv);
  });
}

/* ══ 이벤트 바인딩 ══ */
function bindEvents(card,id){
  card.querySelector('.del-btn').addEventListener('click',e=>{e.stopPropagation();deleteCard(id);});
  card.querySelector('.copy-btn').addEventListener('click',e=>{e.stopPropagation();duplicateCard(id);});

  const minus=card.querySelector('#bpm-minus-'+id);
  const plus=card.querySelector('#bpm-plus-'+id);
  minus.addEventListener('pointerdown',e=>onBpmDown(id,-1,e));
  plus.addEventListener('pointerdown',e=>onBpmDown(id,+1,e));
  ['pointerup','pointercancel','pointerleave'].forEach(ev=>{
    minus.addEventListener(ev,onBpmUp);plus.addEventListener(ev,onBpmUp);
  });

  const bpmEl=card.querySelector('#bpm-'+id);
  bpmEl.addEventListener('blur',()=>commitBpm(id,bpmEl));
  bpmEl.addEventListener('input',()=>liveUpdateBpm(id,bpmEl));
  bpmEl.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();bpmEl.blur();}e.stopPropagation();});
  bpmEl.addEventListener('pointerdown',e=>e.stopPropagation());

  card.querySelector('#sub-seg-'+id).addEventListener('click',e=>{
    const b=e.target.closest('.seg-btn');if(!b)return;
    setSubDiv(id,+b.dataset.div);
  });
  card.querySelector('#beat-seg-'+id).addEventListener('click',e=>{
    const b=e.target.closest('.seg-btn');if(!b)return;
    setBeat(id,+b.dataset.beat,b);
  });
  card.querySelector('#sound-seg-'+id).addEventListener('click',e=>{
    const b=e.target.closest('.seg-btn');if(!b)return;
    setSound(id,b.dataset.sound,b);
  });

  card.querySelector('#vol-'+id).addEventListener('input',e=>{metros[id].vol=+e.target.value;});
  card.querySelector('#mute-'+id).addEventListener('click',()=>toggleMute(id));

  card.querySelector('#tap-btn-'+id).addEventListener('pointerdown',e=>{
    e.preventDefault();e.stopPropagation();tapTempo(id);
  });
  card.querySelector('#p-btn-'+id).addEventListener('pointerdown',e=>{
    e.preventDefault();e.stopPropagation();toggleMetro(id);
  });

  card.querySelector('.info-section').addEventListener('pointerdown',e=>e.stopPropagation());
  card.querySelector('#thumb-center-'+id).addEventListener('pointerdown',e=>e.stopPropagation());
  card.querySelector('.thumb-actions').addEventListener('pointerdown',e=>e.stopPropagation());

  initDrag(card,id);
}

/* ══ 삭제/복제 ══ */
function deleteCard(id){
  if(metros[id]?.isPlaying)stopMetro(id);
  delete metros[id];delete tapTimesMap[id];
  const el=document.getElementById('card-'+id);if(!el)return;
  el.style.cssText+='transition:opacity .18s,transform .18s;opacity:0;transform:scale(.92);';
  setTimeout(()=>{el.remove();renderEmptyState();updateTextareaMaxHeight();},200);
}
function duplicateCard(srcId){
  const m=metros[srcId];if(!m)return;
  globalSongId++;const nid=globalSongId;
  createCard(nid,(document.getElementById('title-'+srcId)?.innerText.trim()||'Song')+' (copy)',m.vId||null);
  const nm=metros[nid];
  Object.assign(nm,{bpm:m.bpm,sig:m.sig,subDiv:m.subDiv,vol:m.vol,sound:m.sound});
  nm.blockStates=[...m.blockStates];
  nm.subStates=m.subStates.map(s=>[...s]);
  document.getElementById('bpm-'+nid).innerText=nm.bpm;
  document.getElementById('beat-seg-'+nid).querySelectorAll('.seg-btn').forEach(b=>b.classList.toggle('active',+b.dataset.beat===nm.sig));
  document.getElementById('sound-seg-'+nid).querySelectorAll('.seg-btn').forEach(b=>b.classList.toggle('active',b.dataset.sound===nm.sound));
  document.getElementById('vol-'+nid).value=nm.vol;
  updateSubIcons(nid);renderViz(nid);
}

/* ══════════════════════════════════════════════
   드래그 & 드롭 (터치 자동 스크롤 포함)
══════════════════════════════════════════════ */
function initDrag(card,id){
  const handle=document.getElementById('handle-'+id);

  // 마우스 드래그
  handle.addEventListener('mousedown',()=>card.setAttribute('draggable','true'));
  document.addEventListener('mouseup',()=>{
    document.querySelectorAll('.song-card').forEach(c=>c.setAttribute('draggable','false'));
  });
  card.addEventListener('dragstart',e=>{
    if(card.getAttribute('draggable')!=='true'){e.preventDefault();return;}
    dragSrcId=id;card.classList.add('dragging');
    e.dataTransfer.effectAllowed='move';activateDim(id);
  });
  card.addEventListener('dragend',()=>{
    card.setAttribute('draggable','false');card.classList.remove('dragging');
    deactivateDim();
    document.querySelectorAll('.song-card').forEach(c=>c.classList.remove('drag-over'));
  });
  card.addEventListener('dragover',e=>{e.preventDefault();if(+card.id.replace('card-','')!==dragSrcId)card.classList.add('drag-over');});
  card.addEventListener('dragleave',()=>card.classList.remove('drag-over'));
  card.addEventListener('drop',e=>{
    e.preventDefault();card.classList.remove('drag-over');
    const tgt=+card.id.replace('card-','');
    if(dragSrcId==null||dragSrcId===tgt)return;
    reorder(dragSrcId,tgt);dragSrcId=null;
  });

  /* 터치 드래그 + 자동 스크롤 */
  handle.addEventListener('touchstart',e=>{
    e.stopPropagation();
    if(_touchDragId!=null)return;
    _touchDragId=id;
    const t=e.touches[0];
    const rect=card.getBoundingClientRect();
    _touchOffX=t.clientX-rect.left;_touchOffY=t.clientY-rect.top;
    _touchGhost=card.cloneNode(true);
    _touchGhost.id='touch-ghost';
    _touchGhost.style.cssText=`position:fixed;pointer-events:none;z-index:9999;width:${rect.width}px;left:${rect.left}px;top:${rect.top}px;opacity:.78;transform:scale(1.04) rotate(1.2deg);border:2px solid var(--accent);box-shadow:0 12px 40px rgba(0,0,0,.6);border-radius:18px;overflow:hidden;transition:none;`;
    document.body.appendChild(_touchGhost);
    card.classList.add('dragging');
    activateDim(id);
    startAutoScroll();
  },{passive:true});

  handle.addEventListener('touchmove',e=>{
    if(_touchDragId!==id||!_touchGhost)return;
    e.preventDefault();
    const t=e.touches[0];
    _touchGhost.style.left=(t.clientX-_touchOffX)+'px';
    _touchGhost.style.top=(t.clientY-_touchOffY)+'px';
    // 자동 스크롤 방향 업데이트
    updateAutoScroll(t.clientY);
    document.querySelectorAll('.song-card').forEach(c=>c.classList.remove('drag-over'));
    const el=document.elementFromPoint(t.clientX,t.clientY);
    const overCard=el?.closest('.song-card');
    if(overCard&&overCard.id!=='card-'+id)overCard.classList.add('drag-over');
  },{passive:false});

  handle.addEventListener('touchend',e=>{
    if(_touchDragId!==id)return;
    e.stopPropagation();
    stopAutoScroll();
    const t=e.changedTouches[0];
    const el=document.elementFromPoint(t.clientX,t.clientY);
    const overCard=el?.closest('.song-card');
    if(overCard&&overCard.id!=='card-'+id)reorder(id,+overCard.id.replace('card-',''));
    _touchGhost?.remove();_touchGhost=null;_touchDragId=null;
    document.getElementById('card-'+id)?.classList.remove('dragging');
    document.querySelectorAll('.song-card').forEach(c=>c.classList.remove('drag-over'));
    deactivateDim();
  },{passive:true});
}

/* 터치 드래그 자동 스크롤 */
let _autoScrollDir = 0; // -1:위, 0:없음, 1:아래
const SCROLL_ZONE = 100; // px
const SCROLL_SPEED = 8;  // px per frame

function startAutoScroll(){
  if(_autoScrollRAF) return;
  function frame(){
    if(_touchDragId==null){stopAutoScroll();return;}
    if(_autoScrollDir!==0) window.scrollBy(0, _autoScrollDir*SCROLL_SPEED);
    _autoScrollRAF=requestAnimationFrame(frame);
  }
  _autoScrollRAF=requestAnimationFrame(frame);
}
function stopAutoScroll(){
  if(_autoScrollRAF){cancelAnimationFrame(_autoScrollRAF);_autoScrollRAF=null;}
  _autoScrollDir=0;
  document.getElementById('scroll-zone-top').classList.remove('visible');
  document.getElementById('scroll-zone-bot').classList.remove('visible');
}
function updateAutoScroll(clientY){
  const vh=window.innerHeight;
  if(clientY<SCROLL_ZONE){
    _autoScrollDir=-1;
    document.getElementById('scroll-zone-top').classList.add('visible');
    document.getElementById('scroll-zone-bot').classList.remove('visible');
  } else if(clientY>vh-SCROLL_ZONE){
    _autoScrollDir=1;
    document.getElementById('scroll-zone-bot').classList.add('visible');
    document.getElementById('scroll-zone-top').classList.remove('visible');
  } else {
    _autoScrollDir=0;
    document.getElementById('scroll-zone-top').classList.remove('visible');
    document.getElementById('scroll-zone-bot').classList.remove('visible');
  }
}

function reorder(srcId,tgtId){
  const ws=document.getElementById('workspace');
  const sc=document.getElementById('card-'+srcId);
  const tc=document.getElementById('card-'+tgtId);
  if(!sc||!tc)return;
  const all=[...ws.querySelectorAll('.song-card')];
  ws.insertBefore(sc,all.indexOf(sc)<all.indexOf(tc)?tc.nextSibling:tc);
}
function activateDim(srcId){
  document.querySelectorAll('.song-card').forEach(c=>{if(c.id!=='card-'+srcId)c.classList.add('drag-dim');});
}
function deactivateDim(){
  document.querySelectorAll('.song-card').forEach(c=>c.classList.remove('drag-dim'));
}

/* ══ 설정 변경 ══ */
function setBeat(id,val,btnEl){
  const m=metros[id];
  m.sig=val;initStates(id);
  document.getElementById('beat-seg-'+id).querySelectorAll('.seg-btn').forEach(b=>b.classList.remove('active'));
  btnEl.classList.add('active');
  renderViz(id);
  if(m.isPlaying&&m.workletNode)m.workletNode.port.postMessage({type:'sig',sig:val});
}
function setSubDiv(id,div){
  const m=metros[id];if(!m)return;
  m.subDiv=div;
  // subStates 초기화 (모두 on=0)
  m.subStates=Array.from({length:m.sig},()=>new Array(16).fill(0));
  document.getElementById('sub-seg-'+id).querySelectorAll('.seg-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('sub-seg-'+id).querySelector(`[data-div="${div}"]`)?.classList.add('active');
  updateSubIcons(id);
  renderViz(id);
  if(m.isPlaying&&m.workletNode)m.workletNode.port.postMessage({type:'subDiv',subDiv:div});
}
function setSound(id,val,btnEl){
  metros[id].sound=val;
  document.getElementById('sound-seg-'+id).querySelectorAll('.seg-btn').forEach(b=>b.classList.remove('active'));
  btnEl.classList.add('active');
}
function toggleMute(id){
  metros[id].muted=!metros[id].muted;
  const btn=document.getElementById('mute-'+id);
  btn.classList.toggle('muted',metros[id].muted);
  btn.innerText=metros[id].muted?'🔇':'🔊';
}

/* ══ 비주얼라이저 렌더링 ══ */
function renderViz(id){
  const m=metros[id];
  const viz=document.getElementById('viz-'+id);if(!viz)return;
  viz.innerHTML='';

  for(let i=0;i<m.sig;i++){
    const b=document.createElement('div');
    b.id='block-'+id+'-'+i;

    const bs=m.blockStates[i]??0;
    b.className='beat-block '+(bs===0?'state-normal':bs===1?'state-accent':'state-off');

    if(m.subDiv>1){
      // 서브 분할 모드: 블록 위에 서브 슬롯 오버레이
      for(let s=0;s<m.subDiv;s++){
        const ss=(m.subStates[i]?.[s])??0;
        const el=document.createElement('div');
        el.className='sub-slot'+(ss===1?' sub-off':'');
        el.id='sub-'+id+'-'+i+'-'+s;
        el.style.left=(s/m.subDiv*100)+'%';
        el.style.width=(100/m.subDiv)+'%';
        const _s=s;
        el.addEventListener('click',e=>{
          e.stopPropagation();
          // 서브 슬롯 클릭: 0↔1 토글 (on/off)
          m.subStates[i][_s]=(m.subStates[i][_s]===0)?1:0;
          renderViz(id);
        });
        b.appendChild(el);
      }
      // 블록 자체 클릭(서브 슬롯 없는 영역): 블록 state 순환
      b.addEventListener('click',e=>{
        if(e.target===b) cycleBlockState(id,i);
      });
    } else {
      // 4분음표 모드: 블록 클릭 → state 순환
      b.addEventListener('click',()=>cycleBlockState(id,i));
    }
    viz.appendChild(b);
  }
}

function cycleBlockState(id,i){
  // 0(파랑) → 1(빨강) → 2(뮤트) → 0
  metros[id].blockStates[i]=(metros[id].blockStates[i]+1)%3;
  renderViz(id);
}

/* 플래시 전용 클리어 (상태 CSS는 유지) */
function clearVizFlash(id){
  document.querySelectorAll(`#viz-${id} .beat-block`).forEach(b=>{
    b.classList.remove('flash-blue','flash-red');
  });
  document.querySelectorAll(`#viz-${id} .sub-slot`).forEach(b=>{
    b.classList.remove('sub-flash');
  });
}

/* ══ 세트리스트 추출 ══ */
function extractSetlist(){
  const cards=document.getElementById('workspace').querySelectorAll('.song-card');
  if(!cards.length){document.getElementById('setlist-output').value='카드가 없습니다.';return;}
  const bl={1:'1/1',3:'3/4',4:'4/4',6:'6/8'};
  const sl={1:'4분음표',2:'8분음표',3:'셋잇단',4:'16분음표'};
  document.getElementById('setlist-output').value=[...cards].map(c=>{
    const id=+c.id.replace('card-','');const m=metros[id];if(!m)return'';
    return(document.getElementById('title-'+id)?.innerText||'제목없음').trim()+
      '  —  BPM: '+m.bpm+' | 박자: '+(bl[m.sig]||'4/4')+
      (m.subDiv>1?' ('+sl[m.subDiv]+')':'');
  }).filter(Boolean).join('\n');
}

function escHtml(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// 윈도우 리사이즈 시 textarea max-height 재계산
window.addEventListener('resize',updateTextareaMaxHeight);
</script>
